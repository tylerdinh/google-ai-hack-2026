<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Stock UI Placeholder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: '#191626',
              panel: '#332042',
              panelBorder: '#7a5a89',
              lavender: '#ae7db7',
              success: '#4fc329',
              danger: '#e35658'
            },
            fontFamily: {
              display: ['Bree Serif', 'serif'],
              body: ['Lexend', 'sans-serif']
            },
            boxShadow: {
              glow: '0 0 0 1px rgba(185, 135, 199, 0.35), 0 12px 40px rgba(13, 10, 22, 0.6)'
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Lexend:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-image:
          radial-gradient(circle at 1px 1px, rgba(168, 128, 184, 0.17) 1px, transparent 1px),
          linear-gradient(162deg, #151321 0%, #201a31 52%, #2a213b 100%);
        background-size: 18px 18px, cover;
      }

      html,
      body,
      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      *::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      .glass-card {
        background: linear-gradient(138deg, rgba(100, 65, 122, 0.48), rgba(51, 33, 66, 0.7));
        border: 1px solid rgba(182, 140, 201, 0.33);
        box-shadow: inset 0 1px 0 rgba(241, 220, 252, 0.14), 0 16px 32px rgba(10, 8, 18, 0.52);
        backdrop-filter: blur(14px);
      }
    </style>
  </head>
  <body class="min-h-screen font-body text-white">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-6 pb-10 pt-0">
      <header class="relative left-1/2 mb-6 w-screen -translate-x-1/2 rounded-b-xl border-b border-panelBorder/25 bg-[#23182f]/95 px-6 py-4 shadow-[0_8px_24px_rgba(0,0,0,0.18)] sm:px-8">
        <h1 class="font-display text-4xl text-lavender sm:text-5xl">idk what do we call this</h1>
      </header>

      <div class="flex flex-1 items-center justify-center">
        <section class="glass-card mx-auto w-full max-w-2xl rounded-3xl p-8 sm:p-10">
          <h2 class="mt-3 font-display text-4xl text-lavender sm:text-5xl">Login</h2>

          <form id="login-form" class="mt-8 space-y-5">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-lavender/90">Email</span>
              <input
                type="email"
                placeholder="you@example.com"
                class="w-full rounded-xl border border-panelBorder/60 bg-canvas/80 px-4 py-3 text-sm outline-none transition focus:border-lavender"
              />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-lavender/90">Password</span>
              <input
                type="password"
                placeholder="********"
                class="w-full rounded-xl border border-panelBorder/60 bg-canvas/80 px-4 py-3 text-sm outline-none transition focus:border-lavender"
              />
            </label>

            <button
              type="submit"
              class="w-full rounded-xl border border-lavender/60 bg-lavender/20 px-5 py-3 text-base font-semibold text-lavender transition hover:bg-lavender/30"
            >
              Log In
            </button>
          </form>
        </section>
      </div>
    </main>

    <script>
      document.getElementById('login-form').addEventListener('submit', function (event) {
        event.preventDefault();
        window.location.href = 'stocks.html';
      });
    </script>
  </body>
</html>
