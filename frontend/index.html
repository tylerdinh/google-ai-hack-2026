<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Research AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3346;
    --text: #e1e4ed;
    --text2: #8b8fa3;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00b894;
    --orange: #fdcb6e;
    --red: #ff6b6b;
    --blue: #74b9ff;
    --pink: #fd79a8;
    --github: #f0f6fc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }

  /* ── Shared ── */
  .hidden { display: none !important; }

  /* =========================================================
     AUTH VIEW
  ========================================================= */
  #auth-view {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 60% 40%, rgba(108,92,231,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(162,155,254,0.07) 0%, transparent 50%),
                var(--bg);
  }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px 36px; width: 380px; max-width: 95vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .auth-logo {
    font-size: 1.25rem; font-weight: 700; color: var(--accent2); margin-bottom: 4px;
  }
  .auth-tagline {
    font-size: 0.72rem; color: var(--text2); margin-bottom: 32px;
  }

  .oauth-btn {
    width: 100%; padding: 11px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-family: inherit; font-size: 0.84rem;
    font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 10px; transition: border-color 0.2s, background 0.2s; margin-bottom: 10px;
  }
  .oauth-btn:hover { border-color: var(--accent); background: rgba(108,92,231,0.08); }
  .oauth-btn svg { flex-shrink: 0; }

  .auth-divider {
    display: flex; align-items: center; gap: 12px;
    font-size: 0.7rem; color: var(--text2); margin: 20px 0;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .auth-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 11px 14px; font-family: inherit; font-size: 0.84rem;
    outline: none; transition: border-color 0.2s; margin-bottom: 10px;
  }
  .auth-input:focus { border-color: var(--accent); }

  .auth-primary-btn {
    width: 100%; padding: 11px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; font-family: inherit;
    font-size: 0.84rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s; margin-top: 4px;
  }
  .auth-primary-btn:hover { opacity: 0.85; }
  .auth-primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .auth-toggle {
    text-align: center; margin-top: 16px; font-size: 0.75rem; color: var(--text2);
  }
  .auth-toggle a { color: var(--accent2); cursor: pointer; text-decoration: none; }
  .auth-toggle a:hover { text-decoration: underline; }

  .auth-error {
    background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3);
    border-radius: 7px; padding: 9px 12px; font-size: 0.75rem; color: var(--red);
    margin-bottom: 14px;
  }
  .auth-success {
    background: rgba(0,184,148,0.1); border: 1px solid rgba(0,184,148,0.3);
    border-radius: 7px; padding: 9px 12px; font-size: 0.75rem; color: var(--green);
    margin-bottom: 14px;
  }

  /* =========================================================
     APP VIEW
  ========================================================= */
  #app-view { min-height: 100vh; }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-brand { font-size: 0.9rem; font-weight: 700; color: var(--accent2); }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .user-email {
    font-size: 0.72rem; color: var(--text2);
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .topbar-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text2); padding: 6px 12px; font-family: inherit; font-size: 0.75rem;
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .topbar-btn:hover { border-color: var(--accent); color: var(--text); }
  .topbar-btn.active { border-color: var(--accent); color: var(--accent2); }

  /* ── Main layout ── */
  .main-layout { display: flex; }

  /* ── Sidebar ── */
  #history-panel {
    width: 300px; min-height: calc(100vh - 52px); flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    transition: width 0.25s, opacity 0.25s;
    overflow-y: auto; display: flex; flex-direction: column;
  }
  #history-panel.collapsed { width: 0; opacity: 0; overflow: hidden; }

  /* Tabs */
  .sidebar-tabs {
    display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sidebar-tab {
    flex: 1; padding: 12px 0; font-size: 0.72rem; font-weight: 600;
    text-align: center; cursor: pointer; color: var(--text2);
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sidebar-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .sidebar-pane { display: none; flex: 1; }
  .sidebar-pane.active { display: block; }

  /* Watchlist */
  .watchlist-add {
    display: flex; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .watchlist-add input {
    flex: 1; padding: 7px 10px; font-size: 0.8rem; text-transform: uppercase;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: inherit; outline: none;
  }
  .watchlist-add input:focus { border-color: var(--accent); }
  .watchlist-add button {
    background: var(--accent); border: none; border-radius: 6px; color: #fff;
    padding: 7px 12px; font-family: inherit; font-size: 0.78rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .watchlist-add button:hover { opacity: 0.85; }
  .stock-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .stock-item:hover { background: var(--surface2); border-left-color: var(--accent); }
  .stock-ticker { font-size: 0.85rem; font-weight: 700; color: var(--text); }
  .stock-name { font-size: 0.65rem; color: var(--text2); margin-top: 1px; }
  .stock-remove {
    background: none; border: none; color: var(--text2); font-size: 1rem;
    cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  .stock-remove:hover { color: var(--red); background: rgba(255,107,107,0.1); }

  /* History */
  .sidebar-section-title {
    font-size: 0.72rem; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 14px 16px 8px;
  }
  .sidebar-empty { font-size: 0.75rem; color: var(--text2); padding: 8px 16px; }
  .history-item {
    padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .history-item:hover { background: var(--surface2); border-left-color: var(--accent); }
  .history-item.active { background: var(--surface2); border-left-color: var(--accent2); }
  .hi-ticker { font-size: 0.82rem; font-weight: 700; color: var(--text); }
  .hi-intent { font-size: 0.68rem; color: var(--text2); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hi-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
  .hi-verdict {
    font-size: 0.6rem; font-weight: 700; padding: 2px 7px; border-radius: 4px;
    text-transform: uppercase;
  }
  .hi-verdict.approved { background: rgba(0,184,148,0.15); color: var(--green); }
  .hi-verdict.rejected { background: rgba(255,107,107,0.15); color: var(--red); }
  .hi-verdict.unknown  { background: rgba(162,155,254,0.1); color: var(--accent2); }
  .hi-date { font-size: 0.62rem; color: var(--text2); }

  /* ── Research panel ── */
  #research-panel { flex: 1; padding: 36px 24px 80px; min-width: 0; }
  .container { max-width: 860px; margin: 0 auto; }

  h1 { font-size: 1.3rem; font-weight: 600; color: var(--accent2); margin-bottom: 4px; }
  .subtitle { color: var(--text2); font-size: 0.78rem; margin-bottom: 28px; }

  .input-row { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 12px 16px; font-family: inherit; font-size: 0.85rem;
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  #ticker { width: 110px; text-transform: uppercase; }
  #intent { flex: 1; min-width: 240px; }
  button.run-btn {
    background: var(--accent); border: none; border-radius: 8px; color: #fff;
    padding: 12px 24px; font-family: inherit; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  button.run-btn:hover { opacity: 0.85; }
  button.run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Phase headers ── */
  .phase-header {
    display: flex; align-items: center; gap: 10px;
    margin: 28px 0 12px; font-size: 0.82rem; font-weight: 600;
  }
  .phase-header:first-child { margin-top: 0; }
  .phase-header.brave { color: var(--orange); }
  .phase-header.agent { color: var(--blue); }
  .phase-header.council { color: var(--pink); }
  .phase-header.done { color: var(--green); }
  .spinner {
    width: 13px; height: 13px; border: 2px solid var(--border);
    border-top-color: currentColor; border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  .check { flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes speakPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(162,155,254,0); }
    50%       { box-shadow: 0 0 0 6px rgba(162,155,254,0.35); }
  }

  /* ── Brave boxes ── */
  .brave-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
  .site-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; animation: fadeUp 0.3s ease forwards;
  }
  .site-box.loading { border-left: 3px solid var(--orange); }
  .site-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .site-rank {
    background: var(--accent); color: #fff; font-size: 0.6rem; font-weight: 700;
    width: 20px; height: 20px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
  }
  .site-title { font-size: 0.82rem; font-weight: 600; line-height: 1.35; }
  .site-title a { color: var(--text); text-decoration: none; }
  .site-title a:hover { color: var(--accent2); }
  .site-url {
    font-size: 0.68rem; color: var(--text2); padding-left: 30px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 8px;
  }
  .site-bullets { list-style: none; padding-left: 30px; display: flex; flex-direction: column; gap: 4px; }
  .site-bullets li {
    font-size: 0.75rem; line-height: 1.5; color: var(--text2);
    position: relative; padding-left: 14px;
  }
  .site-bullets li::before {
    content: '\203A'; position: absolute; left: 0; color: var(--accent); font-weight: 700;
  }
  .site-loading-text { font-size: 0.72rem; color: var(--orange); padding-left: 30px; }

  /* ── Agent steps ── */
  .agent-steps { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .step {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; font-size: 0.78rem; display: flex; align-items: center; gap: 10px;
  }
  .step.running { border-left: 3px solid var(--blue); }
  .step.done { border-left: 3px solid var(--green); }
  .step .label { color: var(--text2); }
  .step.running .label { color: var(--blue); }
  .step.done .label { color: var(--green); }

  .analysis-output {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px 24px; margin-top: 12px; font-size: 0.82rem; line-height: 1.7;
    color: var(--text);
  }
  .analysis-para { white-space: pre-wrap; margin-bottom: 1em; }
  .analysis-para:last-child { margin-bottom: 0; }
  .inline-chart { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); display: block; margin: 16px 0; }

  /* ── Council ── */
  .council-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .council-sub-phase {
    font-size: 0.72rem; color: var(--text2); margin: 8px 0 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .speaking { animation: speakPulse 0.9s ease-in-out infinite !important; }
  .speaking-icon {
    display: inline-flex; align-items: center; gap: 2px;
    margin-left: 6px; vertical-align: middle;
  }
  .speaking-icon span {
    display: inline-block; width: 3px; border-radius: 2px;
    background: currentColor;
    animation: barBounce 0.6s ease-in-out infinite;
  }
  .speaking-icon span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .speaking-icon span:nth-child(2) { height: 10px; animation-delay: 0.1s; }
  .speaking-icon span:nth-child(3) { height: 7px; animation-delay: 0.2s; }
  @keyframes barBounce {
    0%, 100% { transform: scaleY(0.4); }
    50%       { transform: scaleY(1); }
  }
  .council-bubble {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px; animation: fadeUp 0.3s ease forwards;
  }
  .council-bubble .cb-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .cb-avatar {
    width: 24px; height: 24px; border-radius: 6px; font-size: 0.55rem;
    font-weight: 700; display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0; text-transform: uppercase;
  }
  .cb-name { font-size: 0.78rem; font-weight: 600; }
  .cb-arrow { font-size: 0.65rem; color: var(--text2); }
  .cb-content { font-size: 0.75rem; line-height: 1.55; color: var(--text2); padding-left: 32px; }
  .vote-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px;
    animation: fadeUp 0.3s ease forwards;
  }
  .vote-badge {
    padding: 3px 10px; border-radius: 5px; font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; flex-shrink: 0; margin-top: 2px;
  }
  .vote-badge.approve { background: rgba(0,184,148,0.15); color: var(--green); border: 1px solid rgba(0,184,148,0.3); }
  .vote-badge.reject  { background: rgba(255,107,107,0.15); color: var(--red);   border: 1px solid rgba(255,107,107,0.3); }
  .vote-info { flex: 1; }
  .vote-agent { font-size: 0.78rem; font-weight: 600; margin-bottom: 3px; }
  .vote-reasoning { font-size: 0.72rem; color: var(--text2); line-height: 1.5; }
  .verdict {
    background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
    padding: 24px; text-align: center; margin-top: 12px;
    animation: fadeUp 0.4s ease forwards;
  }
  .verdict.approved { border-color: var(--green); }
  .verdict.rejected { border-color: var(--red); }
  .verdict-label { font-size: 0.72rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .verdict-decision { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; letter-spacing: 2px; }
  .verdict.approved .verdict-decision { color: var(--green); }
  .verdict.rejected .verdict-decision { color: var(--red); }
  .verdict-tally { font-size: 0.78rem; color: var(--text2); }
  .verdict.speaking { animation: verdictGlow 1s ease-in-out infinite !important; }
  @keyframes verdictGlow {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 24px 4px rgba(162,155,254,0.25); }
  }
  .error-msg { color: var(--red); font-size: 0.8rem; margin-top: 12px; }

  /* ── Saved badge ── */
  .saved-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,184,148,0.1); border: 1px solid rgba(0,184,148,0.25);
    border-radius: 7px; padding: 7px 14px; font-size: 0.75rem; color: var(--green);
    margin-top: 16px; animation: fadeUp 0.3s ease forwards;
  }
</style>
</head>
<body>

<!-- ===================== AUTH VIEW ===================== -->
<div id="auth-view">
  <div class="auth-card">
    <div class="auth-logo">$ stock_research</div>
    <div class="auth-tagline">AI-powered equity research with a cinematic council debate</div>

    <div id="auth-msg"></div>

    <!-- OAuth -->
    <button class="oauth-btn" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
    <button class="oauth-btn" id="github-btn">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="var(--github)"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      Continue with GitHub
    </button>

    <div class="auth-divider">or sign in with email</div>

    <input class="auth-input" type="email" id="auth-email" placeholder="Email address" />
    <input class="auth-input" type="password" id="auth-password" placeholder="Password (min 8 chars)" />
    <button class="auth-primary-btn" id="auth-submit">Sign In</button>

    <div class="auth-toggle">
      <span id="auth-toggle-text">Don't have an account?</span>
      <a id="auth-toggle-link">Sign Up</a>
    </div>
  </div>
</div>

<!-- ===================== APP VIEW ===================== -->
<div id="app-view" class="hidden">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-brand">$ stock_research</span>
    </div>
    <div class="topbar-right">
      <span class="user-email" id="topbar-email"></span>
      <button class="topbar-btn" id="history-toggle-btn">History</button>
      <button class="topbar-btn" id="logout-btn">Sign Out</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main-layout">
    <!-- Sidebar -->
    <div id="history-panel" class="collapsed">
      <!-- Tabs -->
      <div class="sidebar-tabs">
        <div class="sidebar-tab active" id="tab-watchlist" onclick="switchTab('watchlist')">Watchlist</div>
        <div class="sidebar-tab" id="tab-history" onclick="switchTab('history')">History</div>
      </div>

      <!-- Watchlist pane -->

// ── Authenticated API fetch helper ─────────────────────────────────────────
// Always fetches the freshest session from the SDK so we never send a stale token.
async function apiFetch(path, options = {}) {
  const { data: { session } } = await sb.auth.getSession();
  currentSession = session; // keep in sync
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (session?.access_token) {
    headers['Authorization'] = 'Bearer ' + session.access_token;
  }
  return fetch(path, { ...options, headers });
}

// ── Research pipeline ──────────────────────────────────────────────────────
const AGENT_COLORS = {
  analyst: '#74b9ff', diplomat: '#55efc4', sentinel: '#ff7675', explorer: '#fdcb6e'
};
const AGENT_INITIALS = {
  'The Analyst': 'AN', 'The Diplomat': 'DI', 'The Sentinel': 'SE', 'The Explorer': 'EX'
};
function agentColor(name) {
  for (const [k,v] of Object.entries(AGENT_COLORS))
    if (name.toLowerCase().includes(k)) return v;
  return '#a29bfe';
}
function agentInitial(name) { return AGENT_INITIALS[name] || name.slice(0,2).toUpperCase(); }

const $  = id => document.getElementById(id);
const out = () => $('output');
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}

// ── Audio queue ────────────────────────────────────────────────────────────
const audioQueue = [];
let isPlayingAudio = false;

function enqueueAudio(audio_b64, onStart, onEnd) {
  if (!audio_b64) { if (onStart) onStart(); if (onEnd) onEnd(); return; }
  audioQueue.push({ audio_b64, onStart, onEnd });
  if (!isPlayingAudio) drainAudioQueue();
}
async function drainAudioQueue() {
  if (isPlayingAudio || audioQueue.length === 0) return;
  isPlayingAudio = true;
  while (audioQueue.length > 0) {
    const { audio_b64, onStart, onEnd } = audioQueue.shift();
    if (onStart) onStart();
    await playBase64(audio_b64);
    if (onEnd) onEnd();
  }
  isPlayingAudio = false;
}
function playBase64(b64) {
  return new Promise(resolve => {
    try {
      const audio = new Audio('data:audio/mpeg;base64,' + b64);
      audio.onended = resolve; audio.onerror = () => resolve();
      audio.play().catch(() => resolve());
    } catch { resolve(); }
  });
}
function speakIcon(color) {
  return `<span class="speaking-icon" style="color:${color}"><span></span><span></span><span></span></span>`;
}

function extractBullets(snippet, pageText) {
  const bullets = [];
  if (snippet) {
    const clean = snippet.replace(/<[^>]*>/g, '').trim();
    if (clean) bullets.push(clean.length > 160 ? clean.slice(0,157)+'...' : clean);
  }
  if (pageText && bullets.length < 2) {
    const sentences = pageText.split(/[.!?]\s+/).map(s=>s.trim()).filter(s=>s.length>30&&s.length<200);
    for (const s of sentences) {
      if (bullets.length >= 2) break;
      const c = s.endsWith('.') ? s : s+'.';
      if (!bullets.includes(c)) bullets.push(c);
    }
  }
  if (bullets.length === 0) bullets.push('No content extracted.');
  if (bullets.length === 1) bullets.push('See source for details.');
  return bullets.slice(0, 2);
}

let braveHeader, braveGrid, agentHeader, agentSteps, councilHeader, councilArea;
let loadingBoxes = {};
let pendingStep = null; // { el, doneLabel } — the currently-spinning step, resolved green by the next event

function flushPending() {
  if (!pendingStep) return;
  pendingStep.el.className = 'step done';
  pendingStep.el.innerHTML = '<span class="check">✔</span><span class="label">'+pendingStep.doneLabel+'</span>';
  pendingStep = null;
}

function pushStep(label) {
  const step = el('div', 'step running', '<div class="spinner"></div><span class="label">'+label+'</span>');
  if (agentSteps) agentSteps.appendChild(step);
  pendingStep = { el: step, doneLabel: label };
  return step;
}

async function run() {
  const ticker = $('ticker').value.trim();
  const intent = $('intent').value.trim();
  if (!ticker || !intent) return;

  $('go').disabled = true;
  out().innerHTML = '';
  braveHeader = braveGrid = agentHeader = agentSteps = councilHeader = councilArea = null;
  loadingBoxes = {};
  pendingStep = null;

  // Clear active history highlight
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));

  try {
    const resp = await apiFetch('/research/analyze', {
      method: 'POST',
      body: JSON.stringify({ ticker, intent }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        handleEvent(JSON.parse(line.slice(6)));
      }
    }
  } catch (e) {
    out().appendChild(el('div', 'error-msg', 'Connection error: ' + e.message));
  }
  $('go').disabled = false;
}

function handleEvent(d) {
  if (d.type === 'phase') {
    if (d.phase === 'brave') {
      braveHeader = el('div', 'phase-header brave', '<div class="spinner"></div><span>Web Research</span>');
      braveGrid = el('div', 'brave-grid');
      out().appendChild(braveHeader); out().appendChild(braveGrid);
    } else if (d.phase === 'agent') {
      if (braveHeader) braveHeader.innerHTML = '<span class="check">✔</span><span>Web Research Complete</span>';
      agentHeader = el('div', 'phase-header agent', '<div class="spinner"></div><span>AI Analysis</span>');
      agentSteps = el('div', 'agent-steps');
      out().appendChild(agentHeader); out().appendChild(agentSteps);
    } else if (d.phase === 'council') {
      councilHeader = el('div', 'phase-header council', '<div class="spinner"></div><span>Council Deliberation</span>');
      councilArea = el('div', 'council-area');
      out().appendChild(councilHeader); out().appendChild(councilArea);
    }
    return;
  }

  if (d.type === 'brave_fetching') {
    const box = el('div', 'site-box loading');
    box.innerHTML = '<div class="site-top"><div class="site-rank">'+d.rank+'</div><div class="site-title">'+(d.title||'Loading...')+'</div></div><div class="site-url">'+d.url+'</div><div class="site-loading-text">Fetching page content...</div>';
    loadingBoxes[d.rank] = box;
    if (braveGrid) braveGrid.appendChild(box);
    return;
  }
  if (d.type === 'brave_result') {
    const box = loadingBoxes[d.rank];
    if (!box) return;
    box.className = 'site-box';
    const bullets = extractBullets(d.snippet, d.page_text);
    box.innerHTML = '<div class="site-top"><div class="site-rank">'+d.rank+'</div><div class="site-title"><a href="'+d.url+'" target="_blank">'+(d.title||'Untitled')+'</a></div></div><div class="site-url">'+d.url+'</div><ul class="site-bullets">'+bullets.map(b=>'<li>'+b+'</li>').join('')+'</ul>';
    return;
  }

  if (d.type === 'tool_call') {
    flushPending();
    pushStep(d.label);
    return;
  }
  if (d.type === 'tool_done') {
    // Keep spinner — LLM is now analyzing the result. Just update the done label.
    if (pendingStep) pendingStep.doneLabel = d.label;
    return;
  }
  if (d.type === 'agent_status') {
    flushPending();
    pushStep(d.message);
    return;
  }
  if (d.type === 'agent_done') {
    flushPending();
    if (agentHeader) { agentHeader.innerHTML = '<span class="check">✔</span><span>AI Analysis Complete</span>'; agentHeader.className = 'phase-header done'; }

    // Build interleaved report: walk message_history, match tool calls to images in order
    const chartTools = new Set(['get_price_chart', 'get_technical_chart']);
    const imgQueue = (d.images || []).slice();
    const segments = [];
    for (const msg of (d.message_history || [])) {
      if (msg.kind !== 'response') continue;
      const textContent = (msg.parts || [])
        .filter(p => p.part_kind === 'text' && p.content && p.content.trim())
        .map(p => p.content.trim())
        .join('\n\n');
      if (textContent) segments.push({ type: 'text', content: textContent });
      for (const p of (msg.parts || [])) {
        if (p.part_kind === 'tool-call' && chartTools.has(p.tool_name) && imgQueue.length) {
          segments.push({ type: 'image', data: imgQueue.shift().data });
        }
      }
    }

    if (segments.length) {
      out().appendChild(el('div', 'phase-header done', '<span class="check">✔</span><span>Research Summary</span>'));
      const summaryDiv = el('div', 'analysis-output');
      for (const seg of segments) {
        if (seg.type === 'text') {
          const p = document.createElement('div');
          p.className = 'analysis-para';
          p.textContent = seg.content;
          summaryDiv.appendChild(p);
        } else {
          const img = document.createElement('img');
          img.src = 'data:image/png;base64,' + seg.data;
          img.className = 'inline-chart';
          summaryDiv.appendChild(img);
        }
      }
      out().appendChild(summaryDiv);
    } else if (d.analysis_text) {
      out().appendChild(el('div', 'phase-header done', '<span class="check">✔</span><span>Research Summary</span>'));
      out().appendChild(el('div', 'analysis-output', d.analysis_text));
    }
    return;
  }

  if (d.type === 'council_phase') {
    if (!councilArea) return;
    councilArea.appendChild(el('div', 'council-sub-phase', d.message));
    return;
  }
  if (d.type === 'council_thinking') {
    if (!councilArea) return;
    const color = agentColor(d.agent);
    const bubble = el('div', 'council-bubble');
    bubble.style.borderLeft = '3px solid '+color;
    bubble.innerHTML = '<div class="cb-header"><div class="cb-avatar" style="background:'+color+'">'+agentInitial(d.agent)+'</div><div class="cb-name" style="color:'+color+'">'+d.agent+'</div></div><div class="cb-content">'+d.content+'</div>';
    councilArea.appendChild(bubble);
    bubble.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    enqueueAudio(d.audio_b64,
      () => { bubble.classList.add('speaking'); const n=bubble.querySelector('.cb-name'); if(n) n.innerHTML=d.agent+speakIcon(color); },
      () => { bubble.classList.remove('speaking'); const n=bubble.querySelector('.cb-name'); if(n) n.textContent=d.agent; }
    );
    return;
  }
  if (d.type === 'council_message') {
    if (!councilArea) return;
    const color = agentColor(d.from);
    const bubble = el('div', 'council-bubble');
    bubble.style.borderLeft = '3px solid '+color;
    bubble.innerHTML = '<div class="cb-header"><div class="cb-avatar" style="background:'+color+'">'+agentInitial(d.from)+'</div><div class="cb-name" style="color:'+color+'">'+d.from+'</div><span class="cb-arrow">→ '+d.to+'</span></div><div class="cb-content">'+d.message+'</div>';
    councilArea.appendChild(bubble);
    return;
  }
  if (d.type === 'council_vote') {
    if (!councilArea) return;
    const color = agentColor(d.agent);
    const vbox = el('div', 'vote-box');
    vbox.style.borderLeft = '3px solid '+color;
    vbox.innerHTML = '<div class="vote-badge '+d.vote+'">'+d.vote+'</div><div class="vote-info"><div class="vote-agent" style="color:'+color+'">'+d.agent+'</div><div class="vote-reasoning">'+d.reasoning+'</div></div>';
    councilArea.appendChild(vbox);
    vbox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    enqueueAudio(d.audio_b64,
      () => { vbox.classList.add('speaking'); const a=vbox.querySelector('.vote-agent'); if(a) a.innerHTML=d.agent+speakIcon(color); },
      () => { vbox.classList.remove('speaking'); const a=vbox.querySelector('.vote-agent'); if(a) a.textContent=d.agent; }
    );
    return;
  }
  if (d.type === 'council_verdict') {
    if (!councilArea) return;
    const v = el('div', 'verdict '+d.decision);
    v.innerHTML = '<div class="verdict-label">Council Verdict</div><div class="verdict-decision">'+d.decision.toUpperCase()+'</div><div class="verdict-tally">'+d.approve+' approve &nbsp;/&nbsp; '+d.reject+' reject</div>';
    councilArea.appendChild(v);
    v.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    enqueueAudio(d.audio_b64,
      () => v.classList.add('speaking'),
      () => v.classList.remove('speaking')
    );
    return;
  }
  if (d.type === 'council_done') {
    if (councilHeader) { councilHeader.innerHTML = '<span class="check">✔</span><span>Council Deliberation Complete</span>'; councilHeader.className = 'phase-header done'; }
    return;
  }

  if (d.type === 'done') {
    if (d.analysis_id) {
      const badge = el('div', 'saved-badge', '✔ Analysis saved to your history');
      out().appendChild(badge);
      loadWatchlist(); // Stock was auto-added
      loadHistory();
    }
    return;
  }

  if (d.type === 'error') {
    out().appendChild(el('div', 'error-msg', 'Error: '+(d.detail||d.error||'Unknown error')));
  }
}

document.getElementById('intent').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
