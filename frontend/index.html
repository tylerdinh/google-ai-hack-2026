<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Consilium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: '#191626',
              panel: '#332042',
              panelBorder: '#7a5a89',
              lavender: '#ae7db7',
              success: '#4fc329',
              danger: '#e35658'
            },
            fontFamily: {
              display: ['Bree Serif', 'serif'],
              body: ['Lexend', 'sans-serif']
            },
            boxShadow: {
              glow: '0 0 0 1px rgba(185, 135, 199, 0.35), 0 12px 40px rgba(13, 10, 22, 0.6)'
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        background-image:
          radial-gradient(circle at 1px 1px, rgba(168, 128, 184, 0.17) 1px, transparent 1px),
          linear-gradient(162deg, #151321 0%, #201a31 52%, #2a213b 100%);
        background-size: 18px 18px, cover;
      }
      html, body, * { scrollbar-width: none; -ms-overflow-style: none; }
      html::-webkit-scrollbar, body::-webkit-scrollbar, *::-webkit-scrollbar { width: 0; height: 0; display: none; }
      .glass-card {
        background: linear-gradient(138deg, rgba(100, 65, 122, 0.48), rgba(51, 33, 66, 0.7));
        border: 1px solid rgba(182, 140, 201, 0.33);
        box-shadow: inset 0 1px 0 rgba(241, 220, 252, 0.14), 0 16px 32px rgba(10, 8, 18, 0.52);
        backdrop-filter: blur(14px);
      }
      .divider { display: flex; align-items: center; gap: 12px; }
      .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(122, 90, 137, 0.35); }
    </style>
  </head>
  <body class="min-h-screen font-body text-white">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-6 pb-10 pt-0">
      <header class="relative left-1/2 mb-6 w-screen -translate-x-1/2 rounded-b-xl border-b border-panelBorder/25 bg-[#23182f]/95 px-6 py-4 shadow-[0_8px_24px_rgba(0,0,0,0.18)] sm:px-8">
        <h1 class="font-display text-4xl text-lavender sm:text-5xl">Consilium</h1>
      </header>

      <div class="flex flex-1 items-center justify-center">
        <section class="glass-card mx-auto w-full max-w-2xl rounded-3xl p-8 sm:p-10">
          <h2 class="mt-3 font-display text-4xl text-lavender sm:text-5xl" id="form-title">Login</h2>
          <p class="mt-2 text-sm text-zinc-400" id="form-subtitle">Sign in to access your watchlist and AI analysis.</p>

          <div id="error-box" class="mt-4 hidden rounded-xl border border-danger/40 bg-danger/10 px-4 py-3 text-sm text-danger"></div>
          <div id="success-box" class="mt-4 hidden rounded-xl border border-success/40 bg-success/10 px-4 py-3 text-sm text-success"></div>

          <!-- OAuth buttons -->
          <div class="mt-8 space-y-3">
            <button id="google-btn" type="button" class="flex w-full items-center justify-center gap-3 rounded-xl border border-panelBorder/60 bg-canvas/50 px-5 py-3 text-sm font-semibold text-zinc-200 transition hover:border-lavender/50 hover:bg-canvas/70">
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Continue with Google
            </button>
            <button id="github-btn" type="button" class="flex w-full items-center justify-center gap-3 rounded-xl border border-panelBorder/60 bg-canvas/50 px-5 py-3 text-sm font-semibold text-zinc-200 transition hover:border-lavender/50 hover:bg-canvas/70">
              <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.73.083-.73 1.205.085 1.84 1.236 1.84 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
              Continue with GitHub
            </button>
          </div>

          <div class="divider my-6 text-xs text-zinc-500">or</div>

          <form id="auth-form" class="space-y-5">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-lavender/90">Email</span>
              <input id="email-input" type="email" placeholder="you@example.com" autocomplete="email"
                class="w-full rounded-xl border border-panelBorder/60 bg-canvas/80 px-4 py-3 text-sm outline-none transition focus:border-lavender" />
            </label>
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-lavender/90">Password</span>
              <input id="password-input" type="password" placeholder="••••••••" autocomplete="current-password"
                class="w-full rounded-xl border border-panelBorder/60 bg-canvas/80 px-4 py-3 text-sm outline-none transition focus:border-lavender" />
            </label>
            <div id="confirm-wrap" class="hidden">
              <label class="block">
                <span class="mb-2 block text-sm font-semibold text-lavender/90">Confirm Password</span>
                <input id="confirm-input" type="password" placeholder="••••••••" autocomplete="new-password"
                  class="w-full rounded-xl border border-panelBorder/60 bg-canvas/80 px-4 py-3 text-sm outline-none transition focus:border-lavender" />
              </label>
            </div>
            <button id="submit-btn" type="submit"
              class="w-full rounded-xl border border-lavender/60 bg-lavender/20 px-5 py-3 text-base font-semibold text-lavender transition hover:bg-lavender/30 disabled:opacity-50">
              Log In
            </button>
          </form>

          <p class="mt-6 text-center text-sm text-zinc-500">
            <span id="toggle-label">Don't have an account?</span>
            <button id="toggle-mode" type="button" class="ml-1 font-semibold text-lavender transition hover:text-lavender/80">Sign up</button>
          </p>
        </section>
      </div>
    </main>

    <script>
      const SUPABASE_URL  = 'https://esfsyvcftnriqftgkvvp.supabase.co';
      const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZnN5dmNmdG5yaXFmdGdrdnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5Mzk4MDYsImV4cCI6MjA5MTUxNTgwNn0.o2qvQIK51_qChj6ecg0aCVZ3rcWryg_XwxWgN7S9mRM';
      const { createClient } = supabase;
      const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

      let isSignUp = false;

      const formTitle     = document.getElementById('form-title');
      const formSubtitle  = document.getElementById('form-subtitle');
      const submitBtn     = document.getElementById('submit-btn');
      const toggleMode    = document.getElementById('toggle-mode');
      const toggleLabel   = document.getElementById('toggle-label');
      const confirmWrap   = document.getElementById('confirm-wrap');
      const errorBox      = document.getElementById('error-box');
      const successBox    = document.getElementById('success-box');

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.remove('hidden');
        successBox.classList.add('hidden');
      }
      function showSuccess(msg) {
        successBox.textContent = msg;
        successBox.classList.remove('hidden');
        errorBox.classList.add('hidden');
      }
      function clearMessages() {
        errorBox.classList.add('hidden');
        successBox.classList.add('hidden');
      }

      // Redirect if already logged in
      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = '/stocks.html';
      });

      sb.auth.onAuthStateChange((event, session) => {
        if (session) window.location.href = '/stocks.html';
      });

      toggleMode.addEventListener('click', () => {
        isSignUp = !isSignUp;
        clearMessages();
        if (isSignUp) {
          formTitle.textContent = 'Sign Up';
          formSubtitle.textContent = 'Create an account to save your watchlist and analyses.';
          submitBtn.textContent = 'Create Account';
          toggleLabel.textContent = 'Already have an account?';
          toggleMode.textContent = 'Log in';
          confirmWrap.classList.remove('hidden');
        } else {
          formTitle.textContent = 'Login';
          formSubtitle.textContent = 'Sign in to access your watchlist and AI analysis.';
          submitBtn.textContent = 'Log In';
          toggleLabel.textContent = "Don't have an account?";
          toggleMode.textContent = 'Sign up';
          confirmWrap.classList.add('hidden');
        }
      });

      document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearMessages();
        const email    = document.getElementById('email-input').value.trim();
        const password = document.getElementById('password-input').value;
        const confirm  = document.getElementById('confirm-input').value;

        if (!email || !password) { showError('Please fill in all fields.'); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = isSignUp ? 'Creating account…' : 'Logging in…';

        try {
          if (isSignUp) {
            if (password !== confirm) { showError('Passwords do not match.'); return; }
            const { error } = await sb.auth.signUp({ email, password });
            if (error) throw error;
            showSuccess('Account created! Check your email to confirm, then log in.');
          } else {
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
          }
        } catch (err) {
          showError(err.message || 'Authentication failed.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = isSignUp ? 'Create Account' : 'Log In';
        }
      });

      document.getElementById('google-btn').addEventListener('click', async () => {
        const { error } = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/stocks.html' }
        });
        if (error) showError(error.message);
      });

      document.getElementById('github-btn').addEventListener('click', async () => {
        const { error } = await sb.auth.signInWithOAuth({
          provider: 'github',
          options: { redirectTo: window.location.origin + '/stocks.html' }
        });
        if (error) showError(error.message);
      });
    </script>
  </body>
</html>
