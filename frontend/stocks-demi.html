<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stocks | Placeholder Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: '#191626',
              panel: '#332042',
              panelBorder: '#7a5a89',
              lavender: '#ae7db7',
              success: '#4fc329',
              danger: '#e35658'
            },
            fontFamily: {
              display: ['Bree Serif', 'serif'],
              body: ['Lexend', 'sans-serif']
            },
            boxShadow: {
              glow: '0 0 0 1px rgba(185, 135, 199, 0.24), 0 16px 34px rgba(9, 7, 16, 0.5)'
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Lexend:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-image:
          radial-gradient(circle at 1px 1px, rgba(168, 128, 184, 0.17) 1px, transparent 1px),
          linear-gradient(162deg, #151321 0%, #201a31 52%, #2a213b 100%);
        background-size: 18px 18px, cover;
      }

      html,
      body,
      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      *::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      .glass-card {
        background: linear-gradient(138deg, rgba(100, 65, 122, 0.48), rgba(51, 33, 66, 0.7));
        border: 1px solid rgba(182, 140, 201, 0.33);
        box-shadow: inset 0 1px 0 rgba(241, 220, 252, 0.14), 0 16px 32px rgba(10, 8, 18, 0.52);
        backdrop-filter: blur(14px);
      }

      .glass-slot {
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
        border: 1px dashed rgba(176, 127, 194, 0.46);
      }
    </style>
  </head>
  <body class="min-h-screen font-body text-white">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-6 pb-10 pt-0 sm:pb-12 sm:pt-0">
      <header class="relative left-1/2 mb-3 w-screen -translate-x-1/2 flex items-center justify-between gap-4 rounded-b-xl border-b border-panelBorder/25 bg-[#23182f]/95 px-6 py-4 shadow-[0_8px_24px_rgba(0,0,0,0.18)] sm:px-8">
        <h1 class="font-display text-4xl leading-tight text-lavender sm:text-5xl">idk what do we call this</h1>
        <a
          href="index.html"
          class="rounded-full border border-panelBorder/70 bg-white/5 px-4 py-2 text-sm font-semibold text-lavender transition hover:border-lavender/80"
        >
          Log out
        </a>
      </header>

      <div class="mb-6 flex justify-end">
        <div class="relative">
          <button
            id="open-search-button"
            type="button"
            class="glass-card flex h-12 w-12 items-center justify-center rounded-full text-3xl leading-none text-lavender transition hover:border-lavender/80"
            aria-label="Add stock"
          >
            <span class="-translate-y-[3px]">+</span>
          </button>

          <div
            id="search-panel"
            class="absolute right-0 top-14 z-20 hidden w-[min(92vw,22rem)] rounded-2xl border border-panelBorder/70 bg-panel/95 p-3 shadow-glow backdrop-blur"
          >
            <label for="stock-search-input" class="mb-2 block text-sm font-semibold text-lavender/90">
              Search a stock
            </label>
            <input
              id="stock-search-input"
              type="text"
              placeholder="Ticker or company name"
              autocomplete="off"
              class="w-full rounded-xl border border-panelBorder/70 bg-canvas/80 px-4 py-3 text-sm text-zinc-100 outline-none placeholder:text-zinc-400 focus:border-lavender"
            />
            <div id="search-status" class="mt-2 text-xs text-zinc-400"></div>
            <div id="search-suggestions" class="mt-2 max-h-72 overflow-auto space-y-2"></div>
          </div>
        </div>
      </div>

      <section id="stocks-container" class="flex flex-1 flex-col space-y-3">
        <div id="empty-state" class="glass-card flex flex-1 flex-col items-center justify-center rounded-2xl border border-dashed border-lavender/40 px-6 py-8 text-center text-zinc-300">
          <p class="font-display text-3xl sm:text-4xl text-lavender/90">Click the + button to add a stock.</p>
        </div>
      </section>
    </main>

    <script>
      const API_BASE_URL = window.STOCK_API_BASE_URL || 'http://127.0.0.1:8000';
      const DEFAULT_SYMBOLS = [];
      const STOCK_STATE = [];
      const stocksContainer = document.getElementById('stocks-container');
      const emptyState = document.getElementById('empty-state');
      const openSearchButton = document.getElementById('open-search-button');
      const searchPanel = document.getElementById('search-panel');
      const searchInput = document.getElementById('stock-search-input');
      const searchSuggestions = document.getElementById('search-suggestions');
      const searchStatus = document.getElementById('search-status');
      let searchDebounceId = null;
      let activeSuggestionIndex = -1;

      function toNumber(value) {
        const num = Number(value);
        return Number.isFinite(num) ? num : 0;
      }

      function toCurrency(value) {
        return `$${toNumber(value).toFixed(2)}`;
      }

      function signedValue(value) {
        return `$${Math.abs(toNumber(value)).toFixed(2)}`;
      }

      function signedPercent(value) {
        return `${Math.abs(toNumber(value)).toFixed(2)}%`;
      }

      function setTrendClass(element, isUp) {
        element.classList.remove('text-success', 'text-danger');
        element.classList.add(isUp ? 'text-success' : 'text-danger');
      }

      function formatDelta(change, percent, isUp) {
        return `${isUp ? '▲' : '▼'} ${signedValue(change)} ${isUp ? '▲' : '▼'} ${signedPercent(percent)}`;
      }

      function getSeriesChange(closes) {
        if (!Array.isArray(closes) || closes.length < 2) {
          return null;
        }

        const firstClose = closes[0];
        const lastClose = closes[closes.length - 1];
        const change = lastClose - firstClose;
        const percent = firstClose ? (change / firstClose) * 100 : 0;

        return {
          firstClose,
          lastClose,
          change,
          percent,
          isUp: change >= 0
        };
      }

      function renderSparkline(container, closes, isUp) {
        if (!container || !Array.isArray(closes) || closes.length < 2) {
          return;
        }

        const width = 160;
        const height = 64;
        const min = Math.min(...closes);
        const max = Math.max(...closes);
        const range = max - min || 1;
        const points = closes
          .map((close, idx) => {
            const x = (idx / (closes.length - 1)) * width;
            const y = height - ((close - min) / range) * (height - 8) - 4;
            return `${x.toFixed(2)},${y.toFixed(2)}`;
          })
          .join(' ');

        const stroke = isUp ? '#4fc329' : '#e35658';
        container.innerHTML = `
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" class="h-full w-full">
            <polyline fill="none" stroke="${stroke}" stroke-width="2.6" points="${points}" />
          </svg>
        `;
      }

      function renderEmptyState() {
        emptyState.classList.remove('hidden');
      }

      function hideEmptyState() {
        emptyState.classList.add('hidden');
      }

      function renderStockSkeleton(symbol) {
        const card = document.createElement('a');
        card.href = `stock.html?symbol=${encodeURIComponent(symbol)}`;
        card.dataset.symbol = symbol;
        card.className = 'glass-card grid w-full grid-cols-1 items-center gap-2 rounded-2xl px-4 py-4 transition hover:translate-y-[-1px] hover:border-lavender/80 sm:grid-cols-[1.4fr_1fr_1fr_190px] sm:gap-3 sm:px-5 sm:py-4';
        card.innerHTML = `
          <span data-role="name" class="font-display text-2xl text-zinc-100 sm:text-3xl">${symbol}</span>
          <span data-role="price" class="text-3xl font-semibold text-success sm:text-4xl">$--.--</span>
          <span data-role="delta" class="whitespace-nowrap text-lg font-semibold text-success sm:text-2xl">Loading...</span>
          <span data-role="sparkline" class="glass-slot h-14 w-full rounded-lg"></span>
        `;
        return card;
      }

      async function fetchStockQuote(symbol) {
        const quoteUrl = `${API_BASE_URL}/api/stocks/quotes?symbols=${encodeURIComponent(symbol)}`;
        const response = await fetch(quoteUrl);
        if (!response.ok) {
          throw new Error('Failed to fetch quote data from backend.');
        }
        const data = await response.json();
        return data[symbol] || data;
      }

      async function fetchMiniSeries(symbol) {
        const url = `${API_BASE_URL}/api/stocks/time-series?symbol=${encodeURIComponent(symbol)}&interval=1hour&outputsize=28`;
        const response = await fetch(url);
        if (!response.ok) {
          return [];
        }

        const data = await response.json();
        const values = Array.isArray(data.values) ? data.values : [];
        return values
          .slice()
          .reverse()
          .map((item) => toNumber(item.close))
          .filter(Number.isFinite);
      }

      async function hydrateStockCard(card, symbol) {
        try {
          const [quote, closes] = await Promise.all([fetchStockQuote(symbol), fetchMiniSeries(symbol)]);
          const nameEl = card.querySelector('[data-role="name"]');
          const priceEl = card.querySelector('[data-role="price"]');
          const deltaEl = card.querySelector('[data-role="delta"]');
          const sparkEl = card.querySelector('[data-role="sparkline"]');

          const seriesChange = getSeriesChange(closes);
          const isUp = seriesChange ? seriesChange.isUp : toNumber(quote.change) >= 0;

          nameEl.textContent = quote.name ? `${quote.name} (${symbol})` : symbol;
          priceEl.textContent = seriesChange ? toCurrency(seriesChange.lastClose) : toCurrency(quote.close || quote.previous_close || quote.open || 0);
          deltaEl.textContent = seriesChange
            ? formatDelta(seriesChange.change, seriesChange.percent, isUp)
            : formatDelta(toNumber(quote.change), toNumber(quote.percent_change), isUp);

          setTrendClass(priceEl, isUp);
          setTrendClass(deltaEl, isUp);

          if (closes.length > 1) {
            renderSparkline(sparkEl, closes, isUp);
          }
        } catch (error) {
          const deltaEl = card.querySelector('[data-role="delta"]');
          deltaEl.textContent = 'Data unavailable';
          console.error(error);
        }
      }

      function updateCardHeights() {
        const stocksContainer = document.getElementById('stocks-container');
        const cards = document.querySelectorAll('[data-symbol]');
        const cardCount = cards.length;
        const emptyStateEl = document.getElementById('empty-state');

        if (!stocksContainer) {
          return;
        }

        const containerRect = stocksContainer.getBoundingClientRect();
        const containerHeight = containerRect.height;
        
        if (containerHeight <= 0) {
          return;
        }

        const gap = 12;
        const totalGapHeight = gap * Math.max(0, cardCount - 1);
        const availableHeight = containerHeight - totalGapHeight;
        const baseCardHeight = cardCount > 0 ? availableHeight / cardCount : availableHeight;

        const minCardHeight = 100;
        const maxCardHeight = 320;
        const clampedHeight = Math.max(minCardHeight, Math.min(baseCardHeight, maxCardHeight));

        cards.forEach(function (card) {
          card.style.minHeight = clampedHeight + 'px';
        });

        if (emptyStateEl && cardCount === 0) {
          emptyStateEl.style.minHeight = Math.max(400, containerHeight) + 'px';
        }
      }

      function addStockToPage(symbol) {
        const normalized = symbol.trim().toUpperCase();
        if (!normalized) {
          return;
        }

        if (STOCK_STATE.includes(normalized)) {
          return;
        }

        STOCK_STATE.push(normalized);
        hideEmptyState();

        const card = renderStockSkeleton(normalized);
        stocksContainer.appendChild(card);
        hydrateStockCard(card, normalized);
        updateCardHeights();
      }

      function clearSuggestions() {
        searchSuggestions.innerHTML = '';
        activeSuggestionIndex = -1;
      }

      function getSuggestionButtons() {
        return Array.from(searchSuggestions.querySelectorAll('button[data-symbol]'));
      }

      function setActiveSuggestion(index) {
        const buttons = getSuggestionButtons();
        if (!buttons.length) {
          activeSuggestionIndex = -1;
          return;
        }

        activeSuggestionIndex = ((index % buttons.length) + buttons.length) % buttons.length;
        buttons.forEach((button, buttonIndex) => {
          const isActive = buttonIndex === activeSuggestionIndex;
          button.classList.toggle('border-lavender', isActive);
          button.classList.toggle('bg-white/10', isActive);
          button.classList.toggle('ring-1', isActive);
          button.classList.toggle('ring-lavender/60', isActive);
        });

        buttons[activeSuggestionIndex].scrollIntoView({ block: 'nearest' });
      }

      function renderSuggestions(items) {
        if (!items.length) {
          activeSuggestionIndex = -1;
          searchSuggestions.innerHTML = '<div class="rounded-xl border border-dashed border-lavender/30 px-3 py-2 text-sm text-zinc-400">No matches found.</div>';
          return;
        }

        searchSuggestions.innerHTML = items
          .map((item) => {
            const sublabel = [item.name, item.exchange].filter(Boolean).join(' • ');
            return `
              <button
                type="button"
                data-symbol="${item.symbol}"
                class="w-full rounded-xl border border-panelBorder/70 bg-canvas/70 px-3 py-2 text-left transition hover:border-lavender hover:bg-white/5"
              >
                <div class="text-sm font-semibold text-zinc-100">${item.symbol}</div>
                <div class="text-xs text-zinc-400">${sublabel}</div>
              </button>
            `;
          })
          .join('');

        setActiveSuggestion(0);
      }

      async function searchStocks(query) {
        const cleaned = query.trim();
        if (!cleaned) {
          clearSuggestions();
          searchStatus.textContent = '';
          return;
        }

        searchStatus.textContent = 'Searching...';
        try {
          const response = await fetch(`${API_BASE_URL}/api/stocks/search?query=${encodeURIComponent(cleaned)}`);
          if (!response.ok) {
            throw new Error('Search failed');
          }

          const results = await response.json();
          renderSuggestions(results);
          searchStatus.textContent = results.length ? '' : 'No results.';
        } catch (error) {
          searchSuggestions.innerHTML = '';
          searchStatus.textContent = 'Search unavailable.';
          console.error(error);
        }
      }

      async function hydrateStocks() {
        try {
          for (const symbol of DEFAULT_SYMBOLS) {
            addStockToPage(symbol);
          }
        } catch (error) {
          console.error(error);
        }
      }

      hydrateStocks();
      updateCardHeights();

      window.addEventListener('resize', function () {
        updateCardHeights();
      });

      openSearchButton.addEventListener('click', function () {
        searchPanel.classList.toggle('hidden');
        if (!searchPanel.classList.contains('hidden')) {
          searchInput.focus();
        }
      });

      document.addEventListener('click', function (event) {
        if (!searchPanel.contains(event.target) && !openSearchButton.contains(event.target)) {
          searchPanel.classList.add('hidden');
        }
      });

      searchInput.addEventListener('input', function () {
        clearTimeout(searchDebounceId);
        const query = searchInput.value;
        searchDebounceId = setTimeout(() => searchStocks(query), 250);
      });

      searchSuggestions.addEventListener('click', function (event) {
        const button = event.target.closest('button[data-symbol]');
        if (!button) {
          return;
        }

        addStockToPage(button.dataset.symbol);
        searchInput.value = '';
        clearSuggestions();
        searchStatus.textContent = '';
      });

      searchInput.addEventListener('keydown', function (event) {
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          setActiveSuggestion(activeSuggestionIndex + 1);
          return;
        }

        if (event.key === 'ArrowUp') {
          event.preventDefault();
          setActiveSuggestion(activeSuggestionIndex - 1);
          return;
        }

        if (event.key === 'Enter') {
          event.preventDefault();
          const buttons = getSuggestionButtons();
          const selectedButton = buttons[activeSuggestionIndex] || buttons[0];
          if (selectedButton) {
            addStockToPage(selectedButton.dataset.symbol);
            searchInput.value = '';
            clearSuggestions();
            searchStatus.textContent = '';
          }
        }
      });
    </script>
  </body>
</html>
