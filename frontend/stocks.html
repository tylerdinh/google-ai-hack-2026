<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist | Consilium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: '#191626', panel: '#332042', panelBorder: '#7a5a89',
              lavender: '#ae7db7', success: '#4fc329', danger: '#e35658'
            },
            fontFamily: { display: ['Bree Serif', 'serif'], body: ['Lexend', 'sans-serif'] },
            boxShadow: { glow: '0 0 0 1px rgba(185, 135, 199, 0.24), 0 16px 34px rgba(9, 7, 16, 0.5)' }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        background-image:
          radial-gradient(circle at 1px 1px, rgba(168, 128, 184, 0.17) 1px, transparent 1px),
          linear-gradient(162deg, #151321 0%, #201a31 52%, #2a213b 100%);
        background-size: 18px 18px, cover;
      }
      html, body, * { scrollbar-width: none; -ms-overflow-style: none; }
      html::-webkit-scrollbar, body::-webkit-scrollbar, *::-webkit-scrollbar { width: 0; height: 0; display: none; }
      .glass-card {
        background: linear-gradient(138deg, rgba(100, 65, 122, 0.48), rgba(51, 33, 66, 0.7));
        border: 1px solid rgba(182, 140, 201, 0.33);
        box-shadow: inset 0 1px 0 rgba(241, 220, 252, 0.14), 0 16px 32px rgba(10, 8, 18, 0.52);
        backdrop-filter: blur(14px);
      }
      .glass-slot {
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
        border: 1px dashed rgba(176, 127, 194, 0.46);
      }
    </style>
  </head>
  <body class="min-h-screen font-body text-white">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-6 pb-10 pt-0 sm:pb-12">
      <header class="relative left-1/2 mb-3 w-screen -translate-x-1/2 flex items-center justify-between gap-4 rounded-b-xl border-b border-panelBorder/25 bg-[#23182f]/95 px-6 py-4 shadow-[0_8px_24px_rgba(0,0,0,0.18)] sm:px-8">
        <h1 class="font-display text-4xl leading-tight text-lavender sm:text-5xl">Consilium</h1>
        <div class="flex items-center gap-3">
          <span id="user-email" class="hidden text-xs text-zinc-400 sm:block"></span>
          <button id="logout-btn" type="button" class="rounded-full border border-panelBorder/70 bg-white/5 px-4 py-2 text-sm font-semibold text-lavender transition hover:border-lavender/80">
            Log out
          </button>
        </div>
      </header>

      <div class="mb-6 flex justify-end">
        <div class="relative">
          <button id="open-search-button" type="button" aria-label="Add stock"
            class="glass-card flex h-12 w-12 items-center justify-center rounded-full text-3xl leading-none text-lavender transition hover:border-lavender/80">
            <span class="-translate-y-[3px]">+</span>
          </button>

          <div id="search-panel" class="absolute right-0 top-14 z-20 hidden w-[min(92vw,22rem)] rounded-2xl border border-panelBorder/70 bg-panel/95 p-3 shadow-glow backdrop-blur">
            <label for="stock-search-input" class="mb-2 block text-sm font-semibold text-lavender/90">Search a stock</label>
            <input id="stock-search-input" type="text" placeholder="Ticker or company name" autocomplete="off"
              class="w-full rounded-xl border border-panelBorder/70 bg-canvas/80 px-4 py-3 text-sm text-zinc-100 outline-none placeholder:text-zinc-400 focus:border-lavender" />
            <div id="search-status" class="mt-2 text-xs text-zinc-400"></div>
            <div id="search-suggestions" class="mt-2 max-h-72 overflow-auto space-y-2"></div>
          </div>
        </div>
      </div>

      <section id="stocks-container" class="flex flex-1 flex-col space-y-3">
        <div id="empty-state" class="glass-card flex flex-1 flex-col items-center justify-center rounded-2xl border border-dashed border-lavender/40 px-6 py-8 text-center text-zinc-300">
          <p class="font-display text-3xl sm:text-4xl text-lavender/90">Click the + button to add a stock.</p>
        </div>
      </section>
    </main>

    <script>
      const API_BASE_URL = window.STOCK_API_BASE_URL || '';
      const SUPABASE_URL  = 'https://esfsyvcftnriqftgkvvp.supabase.co';
      const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZnN5dmNmdG5yaXFmdGdrdnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5Mzk4MDYsImV4cCI6MjA5MTUxNTgwNn0.o2qvQIK51_qChj6ecg0aCVZ3rcWryg_XwxWgN7S9mRM';
      const { createClient } = supabase;
      const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

      const stocksContainer   = document.getElementById('stocks-container');
      const emptyState        = document.getElementById('empty-state');
      const openSearchButton  = document.getElementById('open-search-button');
      const searchPanel       = document.getElementById('search-panel');
      const searchInput       = document.getElementById('stock-search-input');
      const searchSuggestions = document.getElementById('search-suggestions');
      const searchStatus      = document.getElementById('search-status');
      let searchDebounceId    = null;
      let activeSuggestionIndex = -1;

      const STOCK_STATE = [];

      // ── Auth ─────────────────────────────────────────────────────────────
      // Cache the session so apiFetch always has a token even when
      // getSession() temporarily returns null during OAuth code exchange.
      let currentSession = null;
      let pageReady = false;

      function initPage(session) {
        if (pageReady) return;
        pageReady = true;
        if (!session) { window.location.href = '/'; return; }
        currentSession = session;
        const email = session.user?.email;
        if (email) {
          const el = document.getElementById('user-email');
          el.textContent = email;
          el.classList.remove('hidden');
        }
        loadWatchlist();
      }

      // onAuthStateChange is the most reliable signal — fires after OAuth
      // code exchange completes, not just from localStorage.
      sb.auth.onAuthStateChange((event, session) => {
        currentSession = session;
        if (event === 'SIGNED_OUT') { window.location.href = '/'; return; }
        if (event === 'INITIAL_SESSION' || event === 'SIGNED_IN') initPage(session);
      });

      // Fallback for email/password login where onAuthStateChange may fire
      // before the .then() resolves — whichever comes first wins.
      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) currentSession = session;
        initPage(session);
      });

      async function apiFetch(path, options = {}) {
        // Prefer cached session; refresh only if nothing cached yet.
        if (!currentSession) {
          const { data } = await sb.auth.getSession();
          currentSession = data.session;
        }
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (currentSession?.access_token) {
          headers['Authorization'] = 'Bearer ' + currentSession.access_token;
        }
        return fetch(API_BASE_URL + path, { ...options, headers });
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await sb.auth.signOut();
        window.location.href = '/';
      });

      // ── Watchlist API ─────────────────────────────────────────────────────
      async function loadWatchlist() {
        try {
          const res = await apiFetch('/stocks');
          if (!res.ok) return;
          const data = await res.json();
          const stocks = Array.isArray(data) ? data : (data.stocks || []);
          for (const s of stocks) addStockToPage(s.ticker_name, false);
        } catch (e) { console.error('Watchlist load failed', e); }
      }

      async function persistAddStock(symbol) {
        try {
          await apiFetch('/stocks', {
            method: 'POST',
            body: JSON.stringify({ ticker_name: symbol })
          });
        } catch (e) { console.error('Failed to save stock', e); }
      }

      async function persistRemoveStock(symbol) {
        try {
          await apiFetch(`/stocks/${encodeURIComponent(symbol)}`, { method: 'DELETE' });
        } catch (e) { console.error('Failed to remove stock', e); }
      }

      // ── Helpers ───────────────────────────────────────────────────────────
      function toNumber(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }
      function toCurrency(v) { return `$${toNumber(v).toFixed(2)}`; }
      function signedValue(v) { return `$${Math.abs(toNumber(v)).toFixed(2)}`; }
      function signedPercent(v) { return `${Math.abs(toNumber(v)).toFixed(2)}%`; }

      function setTrendClass(el, isUp) {
        el.classList.remove('text-success', 'text-danger');
        el.classList.add(isUp ? 'text-success' : 'text-danger');
      }

      function formatDelta(change, percent, isUp) {
        return `${isUp ? '▲' : '▼'} ${signedValue(change)} ${isUp ? '▲' : '▼'} ${signedPercent(percent)}`;
      }

      function getSeriesChange(closes) {
        if (!Array.isArray(closes) || closes.length < 2) return null;
        const first = closes[0], last = closes[closes.length - 1];
        const change = last - first, percent = first ? (change / first) * 100 : 0;
        return { firstClose: first, lastClose: last, change, percent, isUp: change >= 0 };
      }

      function renderSparkline(container, closes, dates, isUp) {
        if (!container || !Array.isArray(closes) || closes.length < 2) return;
        const lW = 48;               // left gutter for min/max price labels
        const bH = 22;               // bottom gutter for date labels
        const w  = 160, h = 64;
        const totalW = w + lW;
        const totalH = h + bH;
        const axisY  = h;            // axis line sits at bottom of data area

        const min = Math.min(...closes), max = Math.max(...closes), range = max - min || 1;
        const fmtSpark = v => v >= 1000 ? `$${v.toFixed(0)}` : v >= 100 ? `$${v.toFixed(1)}` : `$${v.toFixed(2)}`;

        const dataY = c => h - 4 - ((c - min) / range) * (h - 16);
        const pts = closes.map((c, i) => {
          const x = lW + (i / (closes.length - 1)) * w;
          return `${x.toFixed(2)},${dataY(c).toFixed(2)}`;
        }).join(' ');

        const stroke = isUp ? '#4fc329' : '#e35658';
        const lc = 'rgba(161,161,170,0.6)';
        const tc = 'rgba(174,125,183,0.38)';

        // 3 tick positions: start (0), middle, end
        const TICKS = [0, Math.floor((closes.length - 1) / 2), closes.length - 1];
        let tickSvg = '', dateLabelSvg = '';
        TICKS.forEach((dataIdx, ti) => {
          const x      = lW + (dataIdx / (closes.length - 1)) * w;
          const label  = fmtSparkDate((dates || [])[dataIdx]);
          const anchor = ti === 0 ? 'start' : ti === TICKS.length - 1 ? 'end' : 'middle';
          // Clamp so no label bleeds outside the SVG
          let tx = x;
          if (anchor === 'start') tx = Math.max(lW, x);
          if (anchor === 'end')   tx = Math.min(lW + w, x);

          tickSvg      += `<line x1="${x.toFixed(1)}" y1="${axisY}" x2="${x.toFixed(1)}" y2="${(axisY + 5).toFixed(1)}" stroke="${tc}" stroke-width="1.5"/>`;
          dateLabelSvg += `<text x="${tx.toFixed(1)}" y="${(totalH - 2).toFixed(1)}" text-anchor="${anchor}" font-size="11" fill="${lc}" font-family="Lexend,sans-serif">${label}</text>`;
        });

        container.innerHTML = `<svg viewBox="0 0 ${totalW} ${totalH}" preserveAspectRatio="none" class="h-full w-full">
          <text x="0" y="13" font-size="12" fill="${lc}" font-family="Lexend,sans-serif">${fmtSpark(max)}</text>
          <text x="0" y="${axisY - 2}" font-size="12" fill="${lc}" font-family="Lexend,sans-serif">${fmtSpark(min)}</text>
          <line x1="${lW}" y1="2" x2="${lW}" y2="${axisY}" stroke="rgba(122,90,137,0.18)" stroke-width="1"/>
          <polyline fill="none" stroke="${stroke}" stroke-width="2.6" points="${pts}" />
          <line x1="${lW}" y1="${axisY}" x2="${lW + w}" y2="${axisY}" stroke="${tc}" stroke-width="1"/>
          ${tickSvg}${dateLabelSvg}
        </svg>`;
      }

      // ── Stock cards ───────────────────────────────────────────────────────
      function renderEmptyState() { emptyState.classList.remove('hidden'); }
      function hideEmptyState()   { emptyState.classList.add('hidden'); }

      function renderStockSkeleton(symbol) {
        const card = document.createElement('a');
        card.href = `/stock.html?symbol=${encodeURIComponent(symbol)}`;
        card.dataset.symbol = symbol;
        card.className = 'glass-card relative grid w-full grid-cols-1 items-center gap-2 rounded-2xl px-4 py-4 transition hover:-translate-y-px hover:border-lavender/80 sm:grid-cols-[1.4fr_1fr_1fr_190px] sm:gap-3 sm:px-5 sm:py-4';
        card.innerHTML = `
          <span data-role="name" class="font-display text-2xl text-zinc-100 sm:text-3xl">${symbol}</span>
          <span data-role="price" class="text-3xl font-semibold text-success sm:text-4xl">$--.--</span>
          <span data-role="delta" class="whitespace-nowrap text-lg font-semibold text-success sm:text-2xl">Loading…</span>
          <span data-role="sparkline" class="glass-slot h-20 w-full rounded-lg"></span>
          <button data-remove="${symbol}" type="button" class="remove-btn absolute right-3 top-3 flex h-6 w-6 items-center justify-center rounded-full bg-white/5 text-xs text-zinc-500 transition hover:bg-danger/20 hover:text-danger sm:right-4 sm:top-4">✕</button>
        `;
        card.querySelector('.remove-btn').addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          removeStock(symbol, card);
        });
        return card;
      }

      async function fetchStockQuote(symbol) {
        const res = await fetch(`${API_BASE_URL}/api/stocks/quotes?symbols=${encodeURIComponent(symbol)}`);
        if (!res.ok) throw new Error('Quote fetch failed');
        const data = await res.json();
        return data[symbol] || data;
      }

      async function fetchMiniSeries(symbol) {
        const res = await fetch(`${API_BASE_URL}/api/stocks/time-series?symbol=${encodeURIComponent(symbol)}&interval=1hour&outputsize=28`);
        if (!res.ok) return { closes: [], dates: [] };
        const data   = await res.json();
        const values = Array.isArray(data.values) ? data.values.slice() : [];
        const closes = values.map(i => toNumber(i.close)).filter(Number.isFinite);
        const dates  = values.map(i => i.timestamp || i.datetime || i.date || '');
        return { closes, dates };
      }

      // Format a sparkline tick date (hourly data ≈ last ~week)
      // Show weekday + day number: "Mon 7", "Wed 9"
      function fmtSparkDate(dt) {
        if (!dt) return '';
        const d = new Date(String(dt).replace(' ', 'T'));
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' });
      }

      async function hydrateStockCard(card, symbol) {
        try {
          const [quote, series] = await Promise.all([fetchStockQuote(symbol), fetchMiniSeries(symbol)]);
          const { closes, dates } = series;
          const nameEl  = card.querySelector('[data-role="name"]');
          const priceEl = card.querySelector('[data-role="price"]');
          const deltaEl = card.querySelector('[data-role="delta"]');
          const sparkEl = card.querySelector('[data-role="sparkline"]');
          const sc      = getSeriesChange(closes);
          const isUp    = sc ? sc.isUp : toNumber(quote.change) >= 0;

          nameEl.textContent  = quote.name ? `${quote.name} (${symbol})` : symbol;
          priceEl.textContent = sc ? toCurrency(sc.lastClose) : toCurrency(quote.close || quote.previous_close || 0);
          deltaEl.textContent = sc ? formatDelta(sc.change, sc.percent, isUp) : formatDelta(toNumber(quote.change), toNumber(quote.percent_change), isUp);
          setTrendClass(priceEl, isUp);
          setTrendClass(deltaEl, isUp);
          if (closes.length > 1) renderSparkline(sparkEl, closes, dates, isUp);
        } catch (err) {
          const deltaEl = card.querySelector('[data-role="delta"]');
          deltaEl.textContent = 'Data unavailable';
          console.error(err);
        }
      }

      function updateCardHeights() {
        const cards = document.querySelectorAll('[data-symbol]');
        const count = cards.length;
        if (!count) return;
        const containerHeight = stocksContainer.getBoundingClientRect().height;
        if (containerHeight <= 0) return;
        const available = containerHeight - 12 * Math.max(0, count - 1);
        const h = Math.max(100, Math.min(available / count, 320));
        cards.forEach(c => { c.style.minHeight = h + 'px'; });
        if (count === 0) emptyState.style.minHeight = Math.max(400, containerHeight) + 'px';
      }

      function addStockToPage(symbol, persist = true) {
        const normalized = symbol.trim().toUpperCase();
        if (!normalized || STOCK_STATE.includes(normalized)) return;
        STOCK_STATE.push(normalized);
        hideEmptyState();
        const card = renderStockSkeleton(normalized);
        stocksContainer.appendChild(card);
        hydrateStockCard(card, normalized);
        updateCardHeights();
        if (persist) persistAddStock(normalized);
      }

      function removeStock(symbol, card) {
        const idx = STOCK_STATE.indexOf(symbol);
        if (idx > -1) STOCK_STATE.splice(idx, 1);
        card.remove();
        persistRemoveStock(symbol);
        if (STOCK_STATE.length === 0) renderEmptyState();
        updateCardHeights();
      }

      window.addEventListener('resize', updateCardHeights);

      // ── Search ────────────────────────────────────────────────────────────
      function clearSuggestions() { searchSuggestions.innerHTML = ''; activeSuggestionIndex = -1; }
      function getSuggestionButtons() { return Array.from(searchSuggestions.querySelectorAll('button[data-symbol]')); }

      function setActiveSuggestion(index) {
        const buttons = getSuggestionButtons();
        if (!buttons.length) { activeSuggestionIndex = -1; return; }
        activeSuggestionIndex = ((index % buttons.length) + buttons.length) % buttons.length;
        buttons.forEach((btn, i) => {
          const active = i === activeSuggestionIndex;
          btn.classList.toggle('border-lavender', active);
          btn.classList.toggle('bg-white/10', active);
          btn.classList.toggle('ring-1', active);
          btn.classList.toggle('ring-lavender/60', active);
        });
        buttons[activeSuggestionIndex].scrollIntoView({ block: 'nearest' });
      }

      function renderSuggestions(items) {
        if (!items.length) {
          searchSuggestions.innerHTML = '<div class="rounded-xl border border-dashed border-lavender/30 px-3 py-2 text-sm text-zinc-400">No matches found.</div>';
          activeSuggestionIndex = -1;
          return;
        }
        searchSuggestions.innerHTML = items.map(item => {
          const sub = [item.name, item.exchange].filter(Boolean).join(' • ');
          return `<button type="button" data-symbol="${item.symbol}"
            class="w-full rounded-xl border border-panelBorder/70 bg-canvas/70 px-3 py-2 text-left transition hover:border-lavender hover:bg-white/5">
            <div class="text-sm font-semibold text-zinc-100">${item.symbol}</div>
            <div class="text-xs text-zinc-400">${sub}</div>
          </button>`;
        }).join('');
        setActiveSuggestion(0);
      }

      async function searchStocks(query) {
        const cleaned = query.trim();
        if (!cleaned) { clearSuggestions(); searchStatus.textContent = ''; return; }
        searchStatus.textContent = 'Searching…';
        try {
          const res = await fetch(`${API_BASE_URL}/api/stocks/search?query=${encodeURIComponent(cleaned)}`);
          if (!res.ok) throw new Error();
          const results = await res.json();
          renderSuggestions(results);
          if (!results.length) {
            searchSuggestions.innerHTML = '<div class="rounded-xl border border-dashed border-red-500/30 px-3 py-2 text-sm text-red-400">Ticker not found.</div>';
          }
          searchStatus.textContent = '';
        } catch {
          searchSuggestions.innerHTML = '';
          searchStatus.textContent = 'Search unavailable.';
        }
      }

      openSearchButton.addEventListener('click', () => {
        searchPanel.classList.toggle('hidden');
        if (!searchPanel.classList.contains('hidden')) searchInput.focus();
      });

      document.addEventListener('click', (e) => {
        if (!searchPanel.contains(e.target) && !openSearchButton.contains(e.target)) {
          searchPanel.classList.add('hidden');
        }
      });

      searchInput.addEventListener('input', () => {
        clearTimeout(searchDebounceId);
        searchDebounceId = setTimeout(() => searchStocks(searchInput.value), 250);
      });

      searchSuggestions.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-symbol]');
        if (!btn) return;
        addStockToPage(btn.dataset.symbol);
        searchInput.value = '';
        clearSuggestions();
        searchStatus.textContent = '';
        searchPanel.classList.add('hidden');
      });

      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); setActiveSuggestion(activeSuggestionIndex + 1); return; }
        if (e.key === 'ArrowUp')   { e.preventDefault(); setActiveSuggestion(activeSuggestionIndex - 1); return; }
        if (e.key === 'Enter') {
          e.preventDefault();
          const buttons = getSuggestionButtons();
          const sel = buttons[activeSuggestionIndex] || buttons[0];
          if (sel) {
            addStockToPage(sel.dataset.symbol);
            searchInput.value = '';
            clearSuggestions();
            searchStatus.textContent = '';
            searchPanel.classList.add('hidden');
          }
        }
      });

      updateCardHeights();
    </script>
  </body>
</html>
