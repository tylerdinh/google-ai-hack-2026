<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Detail | Consilium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: '#191626', panel: '#332042', panelBorder: '#7a5a89',
              lavender: '#ae7db7', success: '#4fc329', danger: '#e35658'
            },
            fontFamily: { display: ['Bree Serif', 'serif'], body: ['Lexend', 'sans-serif'] },
            boxShadow: { glow: '0 0 0 1px rgba(185, 135, 199, 0.24), 0 16px 34px rgba(9, 7, 16, 0.5)' }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        background-image:
          radial-gradient(circle at 1px 1px, rgba(168, 128, 184, 0.17) 1px, transparent 1px),
          linear-gradient(162deg, #151321 0%, #201a31 52%, #2a213b 100%);
        background-size: 18px 18px, cover;
      }
      html, body, * { scrollbar-width: none; -ms-overflow-style: none; }
      html::-webkit-scrollbar, body::-webkit-scrollbar, *::-webkit-scrollbar { width: 0; height: 0; display: none; }
      .glass-card {
        background: linear-gradient(138deg, rgba(100, 65, 122, 0.48), rgba(51, 33, 66, 0.7));
        border: 1px solid rgba(182, 140, 201, 0.33);
        box-shadow: inset 0 1px 0 rgba(241, 220, 252, 0.14), 0 16px 32px rgba(10, 8, 18, 0.52);
        backdrop-filter: blur(14px);
      }
      .grid-fade {
        background-image:
          linear-gradient(rgba(176, 127, 194, 0.18) 1px, transparent 1px),
          linear-gradient(90deg, rgba(176, 127, 194, 0.18) 1px, transparent 1px);
        background-size: 42px 42px;
      }
      .analysis-shell {
        background: linear-gradient(160deg, rgba(26, 19, 37, 0.86), rgba(38, 27, 50, 0.8));
        border: 1px solid rgba(174, 125, 183, 0.32);
      }
      .timeframe-menu {
        background: linear-gradient(160deg, rgba(42, 29, 58, 0.98), rgba(35, 24, 49, 0.98));
        border: 1px solid rgba(182, 140, 201, 0.34);
        box-shadow: 0 18px 36px rgba(10, 8, 18, 0.42);
      }

      /* ── Analysis output elements ─────────────────────────── */
      @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
      .fade-up { animation: fadeUp 0.25s ease forwards; }

      .phase-row { display:flex; align-items:center; gap:8px; font-size:0.75rem; font-weight:600; color:rgba(174,125,183,0.7); margin:16px 0 8px; }
      .phase-row.done { color:rgba(79,195,41,0.8); }
      .phase-row .check { color:#4fc329; }

      @keyframes spin { to { transform:rotate(360deg); } }
      .spinner { width:12px; height:12px; border:2px solid rgba(174,125,183,0.25); border-top-color:#ae7db7; border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }

      .brave-grid { display:grid; grid-template-columns:1fr; gap:8px; margin-bottom:12px; min-width:0; }
      @media(min-width:640px) { .brave-grid { grid-template-columns:1fr 1fr; } }

      .site-box {
        background:rgba(255,255,255,0.03); border:1px solid rgba(122,90,137,0.35);
        border-radius:12px; padding:10px 12px;
        min-width:0; overflow:hidden;
      }
      .site-box .site-rank { font-size:0.65rem; color:rgba(174,125,183,0.5); font-weight:700; }
      .site-box .site-title { font-size:0.78rem; font-weight:600; color:#e4e4e7; margin:2px 0 3px; overflow-wrap:break-word; word-break:break-word; }
      .site-box .site-title a { color:#ae7db7; text-decoration:none; }
      .site-box .site-title a:hover { text-decoration:underline; }
      .site-box .site-url { font-size:0.65rem; color:rgba(161,161,170,0.5); margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; }
      .site-box .site-bullets { list-style:none; padding:0; margin:0; }
      .site-box .site-bullets li { font-size:0.72rem; color:#a1a1aa; padding:2px 0 2px 10px; position:relative; overflow-wrap:break-word; word-break:break-word; }
      .site-box .site-bullets li::before { content:'›'; position:absolute; left:0; color:#ae7db7; }
      .site-box.loading { opacity:0.5; }

      .agent-step { display:flex; align-items:center; gap:8px; font-size:0.73rem; color:#71717a; padding:3px 0; }
      .agent-step.done { color:#a1a1aa; }
      .agent-step.done .step-spinner { display:none; }
      .agent-step .step-check { display:none; color:#4fc329; }
      .agent-step.done .step-check { display:inline; }

      .bullet-card {
        background:rgba(174,125,183,0.06); border:1px solid rgba(174,125,183,0.2);
        border-radius:12px; padding:14px 16px; margin-bottom:10px;
      }
      .bullet-item { display:flex; align-items:flex-start; gap:8px; font-size:0.8rem; color:#d4d4d8; padding:4px 0; }
      .bullet-item::before { content:'›'; color:#ae7db7; font-weight:700; flex-shrink:0; margin-top:1px; }
      .direct-answer-divider { border:none; border-top:1px solid rgba(174,125,183,0.18); margin:10px 0 8px; }
      .direct-answer { font-size:0.82rem; color:#e4d4f0; line-height:1.6; font-style:italic; }

      .analysis-toggle { font-size:0.72rem; color:#ae7db7; cursor:pointer; margin-bottom:8px; display:inline-flex; align-items:center; gap:4px; user-select:none; }
      .analysis-toggle:hover { color:#c49fc9; }
      .full-analysis { font-size:0.78rem; color:#a1a1aa; line-height:1.65; white-space:pre-wrap; margin-bottom:12px; }
      .full-analysis.hidden { display:none; }
      .analysis-para { margin-bottom:10px; }
      .inline-chart { width:100%; border-radius:8px; margin:8px 0; border:1px solid rgba(122,90,137,0.25); }

      .intent-badge { display:inline-flex; align-items:center; gap:6px; border-radius:8px; padding:5px 11px; font-size:0.7rem; font-weight:600; margin-bottom:14px; }
      .intent-badge.binary { background:rgba(174,125,183,0.1); border:1px solid rgba(174,125,183,0.25); color:#ae7db7; }
      .intent-badge.open   { background:rgba(116,185,255,0.08); border:1px solid rgba(116,185,255,0.2); color:#74b9ff; }

      /* Council */
      .council-bubble {
        background:rgba(255,255,255,0.03); border:1px solid rgba(122,90,137,0.3);
        border-radius:12px; padding:12px; margin-bottom:8px;
      }
      .cb-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
      .cb-avatar { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; color:#191626; flex-shrink:0; }
      .cb-name { font-size:0.78rem; font-weight:600; }
      .cb-content { font-size:0.78rem; color:#d4d4d8; line-height:1.55; }

      .vote-box {
        display:flex; align-items:flex-start; gap:12px;
        background:rgba(255,255,255,0.03); border:1px solid rgba(122,90,137,0.3);
        border-radius:12px; padding:11px 13px; margin-bottom:8px;
      }
      .vote-badge { font-size:0.65rem; font-weight:700; padding:3px 9px; border-radius:6px; flex-shrink:0; margin-top:2px; text-transform:uppercase; }
      .vote-badge.approved { background:#4fc329; color:#0d1a08; }
      .vote-badge.rejected { background:#e35658; color:#fff; }
      .vote-agent { font-size:0.78rem; font-weight:600; margin-bottom:3px; }
      .vote-reasoning { font-size:0.72rem; color:#a1a1aa; }

      .verdict-card { border-radius:16px; padding:24px; text-align:center; margin-top:16px; }
      .verdict-card.approved { background:rgba(79,195,41,0.08); border:1px solid rgba(79,195,41,0.25); }
      .verdict-card.rejected { background:rgba(227,86,88,0.08); border:1px solid rgba(227,86,88,0.25); }
      .verdict-label { font-size:0.65rem; font-weight:700; color:rgba(174,125,183,0.6); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
      .verdict-decision { font-family:'Bree Serif',serif; font-size:2.5rem; margin-bottom:6px; }
      .verdict-decision.approved { color:#4fc329; }
      .verdict-decision.rejected { color:#e35658; }
      .verdict-tally { font-size:0.75rem; color:#71717a; }

      .saved-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(79,195,41,0.1); border:1px solid rgba(79,195,41,0.25); border-radius:8px; padding:6px 12px; font-size:0.72rem; color:#4fc329; margin-top:14px; }

      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      .speaking { animation:pulse 1.4s ease-in-out infinite; }

      /* ── History cards ────────────────────────────────────────── */
      .history-card {
        background: rgba(255,255,255,0.03); border: 1px solid rgba(122,90,137,0.3);
        border-radius: 12px; padding: 12px 14px; cursor: pointer;
        transition: border-color 0.15s;
      }
      .history-card:hover { border-color: rgba(174,125,183,0.55); }
      .history-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
      .history-date { font-size: 0.65rem; color: #71717a; }
      .history-verdict { font-size: 0.6rem; font-weight: 700; padding: 2px 7px; border-radius: 5px; text-transform: uppercase; }
      .history-verdict.approved { background: rgba(79,195,41,0.15); color: #4fc329; border: 1px solid rgba(79,195,41,0.3); }
      .history-verdict.rejected { background: rgba(227,86,88,0.15); color: #e35658; border: 1px solid rgba(227,86,88,0.3); }
      .history-verdict.none     { background: rgba(174,125,183,0.1); color: #ae7db7; border: 1px solid rgba(174,125,183,0.2); }
      .history-prompt { font-size: 0.78rem; color: #d4d4d8; line-height: 1.4; }
      .history-advice { font-size: 0.72rem; color: #71717a; margin-top: 6px; line-height: 1.55; white-space: pre-wrap; display: none; }
      .history-card.expanded .history-advice { display: block; }
      .history-expand-icon { font-size: 0.65rem; color: #ae7db7; margin-left: auto; flex-shrink: 0; }

        <div class="h-[240px] rounded-b-2xl border-t border-lavender/25 p-3 sm:h-[300px] sm:p-4">
          <div id="chart-area" class="grid-fade flex h-full w-full items-center justify-center rounded-xl border border-dashed border-lavender/45 bg-canvas/25 text-center text-sm text-zinc-300">

        </div>

      <section class="glass-card rounded-2xl p-3 sm:p-4">
        <form id="analyze-form">
          <div class="flex items-center gap-2 sm:gap-3">
            <textarea id="analysis-input" rows="1" placeholder="What do you want me to analyze?"
              class="min-h-[4.5rem] w-full resize-none overflow-hidden bg-transparent px-2 py-4 font-display text-2xl leading-[1.35] text-zinc-100 placeholder-lavender/100 outline-none sm:min-h-[5.25rem] sm:py-5 sm:text-4xl"></textarea>
            <button type="submit" aria-label="Submit query"
              class="shrink-0 rounded-xl border border-panelBorder/70 bg-white/8 px-4 py-2 text-sm font-semibold text-lavender transition hover:border-lavender/80 hover:bg-white/12 sm:px-5 sm:py-3 sm:text-base">
              &rarr;
            </button>
          </div>
        </form>
      </section>

      <!-- ── Past analyses for this stock ──────────────────────────── -->
      <section id="history-section" class="mt-3 hidden">
        <div class="glass-card rounded-2xl p-4 sm:p-5">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="font-display text-lg text-lavender sm:text-xl">Past Analyses</h2>
            <span id="history-count" class="text-xs text-zinc-500"></span>

          <div id="history-list" class="space-y-2"></div>
        </div>

      <section id="analysis-output" class="analysis-shell mt-3 hidden min-h-[68vh] rounded-2xl p-4 sm:p-6">
        <!-- filled dynamically -->
      </section>

    <script>
      const API_BASE_URL  = window.STOCK_API_BASE_URL || '';
      const SUPABASE_URL  = 'https://esfsyvcftnriqftgkvvp.supabase.co';
      const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZnN5dmNmdG5yaXFmdGdrdnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5Mzk4MDYsImV4cCI6MjA5MTUxNTgwNn0.o2qvQIK51_qChj6ecg0aCVZ3rcWryg_XwxWgN7S9mRM';
      const { createClient } = supabase;
      const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

      const params         = new URLSearchParams(window.location.search);
      const symbol         = (params.get('symbol') || 'AAPL').toUpperCase();
      const summaryEl      = document.getElementById('summary');
      const chartArea      = document.getElementById('chart-area');
      const chartSection   = document.getElementById('chart-section');
      const timeframeBtn   = document.getElementById('timeframe-button');
      const timeframeLbl   = document.getElementById('timeframe-label');
      const timeframeMenu  = document.getElementById('timeframe-menu');
      const analyzeForm    = document.getElementById('analyze-form');
      const analysisInput  = document.getElementById('analysis-input');
      const analysisOutput = document.getElementById('analysis-output');

      let currentQuote   = null;
      let currentRange   = 'lastWeek';
      let isAnalyzing    = false;

      const TIMEFRAME_CONFIG = {
        today:     { interval: '5min',  outputsize: 78 },
        lastWeek:  { interval: '1hour', outputsize: 28 },
        lastMonth: { interval: '1day',  outputsize: 30 },
        lastYear:  { interval: '1week', outputsize: 52 }
      };

      // ── Auth ──────────────────────────────────────────────────────────────
      let currentSession = null;
      let pageReady = false;

      function initPage(session) {
        if (pageReady) return;
        pageReady = true;
        if (!session) { window.location.href = '/'; return; }
        currentSession = session;
        const email = session.user?.email;
        if (email) {
          const el = document.getElementById('user-email');
          el.textContent = email;
          el.classList.remove('hidden');
        }
        loadHistory();
      }

      sb.auth.onAuthStateChange((event, session) => {
        currentSession = session;
        if (event === 'SIGNED_OUT') { window.location.href = '/'; return; }
        if (event === 'INITIAL_SESSION' || event === 'SIGNED_IN') initPage(session);
      });

      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) currentSession = session;
        initPage(session);
      });

      async function apiFetch(path, options = {}) {
        if (!currentSession) {
          const { data } = await sb.auth.getSession();
          currentSession = data.session;
        }
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (currentSession?.access_token) {
          headers['Authorization'] = 'Bearer ' + currentSession.access_token;
        }
        return fetch(API_BASE_URL + path, { ...options, headers });
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await sb.auth.signOut();
        window.location.href = '/';
      });

      // ── Stock chart helpers ───────────────────────────────────────────────
      function toNumber(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }
      function toCurrency(v) { return `$${toNumber(v).toFixed(2)}`; }
      function signedValue(v) { return `$${Math.abs(toNumber(v)).toFixed(2)}`; }
      function signedPercent(v) { return `${Math.abs(toNumber(v)).toFixed(2)}%`; }

      function getSeriesChange(values) {
        if (!Array.isArray(values) || values.length < 2) return null;
        const closes = values.map(e => toNumber(e.close)).filter(Number.isFinite);
        if (closes.length < 2) return null;
        const first = closes[0], last = closes[closes.length - 1];
        const change = last - first, percent = first ? (change / first) * 100 : 0;
        return { lastClose: last, change, percent, isUp: change >= 0 };
      }

      function renderSummary(quote, values = []) {
        const sc      = getSeriesChange(values);
        const change  = sc ? sc.change  : toNumber(quote.change);
        const percent = sc ? sc.percent : toNumber(quote.percent_change);
        const isUp    = sc ? sc.isUp    : change >= 0;
        const cls     = isUp ? 'text-success' : 'text-danger';
        const name    = quote.name ? `${quote.name} (${symbol})` : symbol;
        const price   = toCurrency(sc ? sc.lastClose : quote.close || quote.previous_close || 0);
        const delta   = `${isUp ? '▲' : '▼'} ${signedValue(change)} ${isUp ? '▲' : '▼'} ${signedPercent(percent)}`;
        summaryEl.innerHTML = `
          <p class="font-display text-2xl text-zinc-100 sm:text-4xl">${name}</p>
          <p class="text-3xl font-semibold ${cls} sm:text-4xl">${price}</p>
          <p class="whitespace-nowrap text-2xl font-semibold ${cls} sm:text-3xl">${delta}</p>`;
        document.title = `${name} | Consilium`;
        summaryEl.classList.remove('hidden');
      }

      // Format a datetime string from Yahoo Finance based on the selected range,
      // following standard financial-chart conventions (TradingView / Bloomberg style).
      function formatChartDate(dt, range, isFirstLabel) {
        if (!dt) return '';
        const d = new Date(String(dt).replace(' ', 'T'));
        if (isNaN(d.getTime())) return '';
        const yr2 = String(d.getFullYear()).slice(2); // "25", "26"
        switch (range) {
          case 'today':
            // Intraday: "9:30 AM", "2:00 PM"
            return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

          case 'lastWeek':
            // ~4 trading days of hourly bars → show weekday + date, e.g. "Mon 7"
            return d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' });

          case 'lastMonth':
            // Daily bars → "Apr 7", "Apr 14", …
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

          case 'lastYear':
            // Weekly bars → "Apr '25", "Jul '25", "Jan '26"
            // Show year on January labels (year boundary) or the very first label.
            {
              const mon = d.toLocaleDateString('en-US', { month: 'short' });
              const showYear = d.getMonth() === 0 || isFirstLabel;
              return showYear ? `${mon} '${yr2}` : mon;
            }

          default:
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
      }

      function renderCandles(values) {
        if (!Array.isArray(values) || !values.length) { chartArea.textContent = 'No chart data.'; return; }

        const candles = values.slice().map(e => ({
          open: toNumber(e.open), high: toNumber(e.high),
          low: toNumber(e.low),   close: toNumber(e.close),
          datetime: e.timestamp || e.datetime || e.date || ''
        }));

        // ViewBox dimensions — 3:1 ratio matches the chart container well
        const W = 1200, H = 400;
        const padL = 82, padR = 16, padT = 14, padB = 38;
        const cW = W - padL - padR;
        const cH = H - padT - padB;

        const minLow  = Math.min(...candles.map(c => c.low));
        const maxHigh = Math.max(...candles.map(c => c.high));
        const priceRange = maxHigh - minLow || 1;
        // Add 6 % margin so candles don't touch the top/bottom edges
        const margin = priceRange * 0.06;
        const pMin = minLow  - margin;
        const pMax = maxHigh + margin;
        const pRange = pMax - pMin;

        const step = cW / candles.length;
        const cw   = Math.max(4, step * 0.62);
        const px   = i => padL + step * i + step / 2;
        const py   = p => padT + cH - ((p - pMin) / pRange) * cH;

        // Price label formatter
        const fmtP = p => p >= 1000 ? `$${p.toFixed(0)}` : p >= 100 ? `$${p.toFixed(1)}` : `$${p.toFixed(2)}`;

        // ── Y-axis: 5 gridlines + price labels ──────────────────────────
        let gridSvg = '', yLabelSvg = '';
        const Y_STEPS = 5;
        for (let i = 0; i <= Y_STEPS; i++) {
          const price = pMin + (pRange * i / Y_STEPS);
          const y     = py(price);
          gridSvg   += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}" stroke="rgba(174,125,183,0.12)" stroke-width="1" stroke-dasharray="4 4"/>`;
          yLabelSvg += `<text x="${(padL - 7).toFixed(1)}" y="${(y + 5).toFixed(1)}" text-anchor="end" font-size="19" fill="rgba(161,161,170,0.65)" font-family="Lexend,sans-serif">${fmtP(price)}</text>`;
        }

        // ── X-axis: bottom axis line + tick marks + date labels ─────────
        const axisY  = padT + cH;
        // Thin horizontal axis rule
        const axisLine = `<line x1="${padL}" y1="${axisY}" x2="${W - padR}" y2="${axisY}" stroke="rgba(174,125,183,0.22)" stroke-width="1"/>`;

        let xTickSvg = '', xLabelSvg = '';
        const N_DATES = Math.min(5, candles.length);
        for (let i = 0; i < N_DATES; i++) {
          const idx   = Math.round(i * (candles.length - 1) / Math.max(1, N_DATES - 1));
          const label = formatChartDate(candles[idx].datetime, currentRange, i === 0);
          // Raw x, then clamp so neither text nor tick overflows the chart area
          let x = px(idx);
          x = Math.max(padL, Math.min(W - padR, x));

          // Tick mark just below the axis line
          xTickSvg += `<line x1="${x.toFixed(1)}" y1="${axisY}" x2="${x.toFixed(1)}" y2="${(axisY + 7).toFixed(1)}" stroke="rgba(174,125,183,0.45)" stroke-width="1.5"/>`;

          // Text anchor: left-align first label, right-align last, centre the rest
          const anchor = i === 0 ? 'start' : i === N_DATES - 1 ? 'end' : 'middle';
          // Shift the clamped text x so it stays fully inside the chart bounds
          let tx = x;
          if (anchor === 'start') tx = Math.max(padL, x);
          if (anchor === 'end')   tx = Math.min(W - padR, x);
          xLabelSvg += `<text x="${tx.toFixed(1)}" y="${(H - 6).toFixed(1)}" text-anchor="${anchor}" font-size="18" fill="rgba(161,161,170,0.72)" font-family="Lexend,sans-serif">${label}</text>`;
        }

        // ── Candles ──────────────────────────────────────────────────────
        const candleSvg = candles.map((c, i) => {
          const x   = px(i);
          const top = Math.min(py(c.open), py(c.close));
          const bh  = Math.max(3, Math.abs(py(c.close) - py(c.open)));
          const col = c.close >= c.open ? '#4fc329' : '#e35658';
          return `<line x1="${x.toFixed(2)}" y1="${py(c.high).toFixed(2)}" x2="${x.toFixed(2)}" y2="${py(c.low).toFixed(2)}" stroke="${col}" stroke-width="2"/>
                  <rect x="${(x - cw / 2).toFixed(2)}" y="${top.toFixed(2)}" width="${cw.toFixed(2)}" height="${bh.toFixed(2)}" fill="${col}" rx="1"/>`;
        }).join('');

        chartArea.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" class="h-full w-full">
          ${gridSvg}${axisLine}${candleSvg}${yLabelSvg}${xTickSvg}${xLabelSvg}
        </svg>`;
      }

      async function fetchQuote() {
        const res = await fetch(`${API_BASE_URL}/api/stocks/quotes?symbols=${encodeURIComponent(symbol)}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        return data[symbol] || data;
      }

      async function fetchTimeSeries(interval, outputsize) {
        const res = await fetch(`${API_BASE_URL}/api/stocks/time-series?symbol=${encodeURIComponent(symbol)}&interval=${encodeURIComponent(interval)}&outputsize=${outputsize}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (!Array.isArray(data.values)) throw new Error();
        return data.values;
      }

      async function loadChart(rangeKey) {
        const cfg = TIMEFRAME_CONFIG[rangeKey] || TIMEFRAME_CONFIG.lastWeek;
        currentRange = rangeKey;
        chartArea.textContent = 'Loading chart…';
        const values = await fetchTimeSeries(cfg.interval, cfg.outputsize);
        renderCandles(values);
        if (currentQuote) renderSummary(currentQuote, values);
      }

      async function hydrateStockDetail() {
        try {
          currentQuote = await fetchQuote();
          renderSummary(currentQuote);
          await loadChart(currentRange);
        } catch {
          summaryEl.innerHTML = `<p class="font-display text-2xl text-zinc-100 sm:text-4xl">${symbol}</p>
            <p class="text-3xl font-semibold text-danger sm:text-4xl">Data unavailable</p>
            <p class="text-2xl font-semibold text-zinc-300 sm:text-3xl">Check backend server.</p>`;
          chartArea.textContent = 'Unable to load chart data.';
        }
      }

      hydrateStockDetail();

      // Timeframe dropdown
      function closeMenu() { timeframeMenu.classList.add('hidden'); timeframeBtn.setAttribute('aria-expanded','false'); }
      function openMenu()  { timeframeMenu.classList.remove('hidden'); timeframeBtn.setAttribute('aria-expanded','true'); }
      timeframeBtn.addEventListener('click', e => { e.stopPropagation(); timeframeMenu.classList.contains('hidden') ? openMenu() : closeMenu(); });
      document.querySelectorAll('.timeframe-option').forEach(opt => {
        opt.addEventListener('click', async () => {
          timeframeLbl.textContent = opt.textContent.trim();
          closeMenu();
          try { await loadChart(opt.dataset.range); } catch { chartArea.textContent = 'Unable to load chart.'; }
        });
      });
      document.addEventListener('click', closeMenu);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

      // ── Analysis output helpers ───────────────────────────────────────────
      function mk(tag, cls = '', html = '') {
        const el = document.createElement(tag);
        if (cls) el.className = cls;
        if (html) el.innerHTML = html;
        return el;
      }

      function agentColor(name) {
        const n = (name || '').toLowerCase();
        if (n.includes('analyst'))  return '#ae7db7';
        if (n.includes('diplomat')) return '#74b9ff';
        if (n.includes('sentinel')) return '#e35658';
        if (n.includes('explorer')) return '#4fc329';
        return '#ae7db7';
      }
      function agentInitial(name) { return (name || '?')[0].toUpperCase(); }

      function extractBullets(snippet, pageText) {
        const src = [snippet, pageText].filter(Boolean).join(' ');
        const sentences = src.match(/[^.!?]+[.!?]+/g) || [src];
        return sentences.slice(0, 2).map(s => s.trim());
      }

      // ── Audio queue ───────────────────────────────────────────────────────
      let audioQueue = [], audioPlaying = false;
      function enqueueAudio(b64, onStart, onEnd) {
        if (!b64) return;
        audioQueue.push({ b64, onStart, onEnd });
        if (!audioPlaying) drainAudio();
      }
      async function drainAudio() {
        if (!audioQueue.length) { audioPlaying = false; return; }
        audioPlaying = true;
        const { b64, onStart, onEnd } = audioQueue.shift();
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const raw = atob(b64);
          const buf = new Uint8Array(raw.length);
          for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
          const decoded = await ctx.decodeAudioData(buf.buffer);
          const src = ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(ctx.destination);
          if (onStart) onStart();
          src.onended = () => { if (onEnd) onEnd(); ctx.close(); drainAudio(); };
          src.start();
        } catch { if (onEnd) onEnd(); drainAudio(); }
      }

      // ── SSE event renderer ────────────────────────────────────────────────
      let braveHeader = null, braveGrid = null;
      let agentHeader = null, agentSteps = null, pendingStep = null;
      let councilHeader = null, councilArea = null;

      function flushPending() {
        if (!pendingStep) return;
        pendingStep.el.className = 'agent-step done fade-up';
        pendingStep = null;
      }

      function pushStep(label) {
        flushPending();
        const row = mk('div', 'agent-step fade-up');
        row.innerHTML = `<div class="spinner step-spinner"></div><span class="step-check">✓</span><span>${label}</span>`;
        if (agentSteps) agentSteps.appendChild(row);
        pendingStep = { el: row };
      }

      function handleEvent(d) {
        if (d.type === 'intent_classified') {
          const badge = mk('div', `intent-badge ${d.is_binary ? 'binary' : 'open'} fade-up`);
          badge.textContent = d.is_binary ? '🗳️ Decision question — council will debate' : '📊 Open analysis — council not needed';
          analysisOutput.appendChild(badge);
          return;
        }

        if (d.type === 'phase') {
          if (d.phase === 'brave') {
            braveHeader = mk('div', 'phase-row fade-up', '<div class="spinner"></div><span>Web Research</span>');
            braveGrid   = mk('div', 'brave-grid');
            analysisOutput.appendChild(braveHeader);
            analysisOutput.appendChild(braveGrid);
          } else if (d.phase === 'agent') {
            if (braveHeader) { braveHeader.className = 'phase-row done fade-up'; braveHeader.innerHTML = '<span class="check">✓</span><span>Web Research Complete</span>'; }
            agentHeader = mk('div', 'phase-row fade-up', '<div class="spinner"></div><span>AI Analysis</span>');
            agentSteps  = mk('div', 'space-y-px mb-3');
            analysisOutput.appendChild(agentHeader);
            analysisOutput.appendChild(agentSteps);
          } else if (d.phase === 'council') {
            councilHeader = mk('div', 'phase-row fade-up', '<div class="spinner"></div><span>Council Deliberation</span>');
            councilArea   = mk('div', 'mt-2');
            analysisOutput.appendChild(councilHeader);
            analysisOutput.appendChild(councilArea);
          }
          return;
        }

        if (d.type === 'brave_fetching') {
          const box = mk('div', 'site-box loading fade-up');
          box.innerHTML = `<div class="site-rank">#${d.rank}</div><div class="site-title">${d.title || 'Loading…'}</div><div class="site-url">${d.url}</div><div class="text-xs text-zinc-600 mt-1">Fetching…</div>`;
          box.dataset.rank = d.rank;
          if (braveGrid) braveGrid.appendChild(box);
          return;
        }

        if (d.type === 'brave_result') {
          const existing = braveGrid && braveGrid.querySelector(`[data-rank="${d.rank}"]`);
          const bullets = extractBullets(d.snippet, d.page_text);
          const html = `<div class="site-rank">#${d.rank}</div>
            <div class="site-title"><a href="${d.url}" target="_blank">${d.title || 'Untitled'}</a></div>
            <div class="site-url">${d.url}</div>
            <ul class="site-bullets">${bullets.map(b => `<li>${b}</li>`).join('')}</ul>`;
          if (existing) { existing.className = 'site-box fade-up'; existing.innerHTML = html; }
          else { const box = mk('div', 'site-box fade-up'); box.innerHTML = html; if (braveGrid) braveGrid.appendChild(box); }
          return;
        }

        if (d.type === 'tool_call')   { pushStep(d.label); return; }
        if (d.type === 'tool_done')   { if (pendingStep) pendingStep.doneLabel = d.label; return; }
        if (d.type === 'agent_status') { flushPending(); pushStep(d.message); return; }

        if (d.type === 'agent_done') {
          flushPending();
          if (agentHeader) { agentHeader.className = 'phase-row done fade-up'; agentHeader.innerHTML = '<span class="check">✓</span><span>AI Analysis Complete</span>'; }

          const hdr = mk('div', 'phase-row done fade-up', '<span class="check">✓</span><span>Research Summary</span>');
          analysisOutput.appendChild(hdr);

          // Bullet summary
          const bullets = d.bullets || [];
          if (bullets.length) {
            const card = mk('div', 'bullet-card fade-up');
            bullets.forEach(b => {
              const item = mk('div', 'bullet-item');
              item.textContent = b;
              card.appendChild(item);
            });

            // Direct answer (non-binary only)
            if (!d.is_binary && d.direct_answer) {
              const hr = document.createElement('hr');
              hr.className = 'direct-answer-divider';
              card.appendChild(hr);
              const ans = mk('div', 'direct-answer');
              ans.textContent = d.direct_answer;
              card.appendChild(ans);
            }

            analysisOutput.appendChild(card);
          }

          // Full analysis + charts (collapsible)
          const chartTools = new Set(['get_price_chart', 'get_technical_chart']);
          const imgQueue   = (d.images || []).slice();
          const segments   = [];
          for (const msg of (d.message_history || [])) {
            if (msg.kind !== 'response') continue;
            const text = (msg.parts || []).filter(p => p.part_kind === 'text' && p.content?.trim()).map(p => p.content.trim()).join('\n\n');
            if (text) segments.push({ type: 'text', content: text });
            for (const p of (msg.parts || [])) {
              if (p.part_kind === 'tool-call' && chartTools.has(p.tool_name) && imgQueue.length) {
                segments.push({ type: 'image', data: imgQueue.shift().data });
              }
            }
          }

          const hasImages = segments.some(s => s.type === 'image');
          if (segments.length || d.analysis_text) {
            const toggle  = mk('div', 'analysis-toggle', hasImages || !bullets.length ? '▾ Hide full analysis' : '▸ View full analysis');
            const fullDiv = mk('div', 'full-analysis' + (hasImages || !bullets.length ? '' : ' hidden'));
            if (segments.length) {
              for (const seg of segments) {
                if (seg.type === 'text') { const p = mk('div', 'analysis-para'); p.textContent = seg.content; fullDiv.appendChild(p); }
                else { const img = mk('img', 'inline-chart'); img.src = 'data:image/png;base64,' + seg.data; fullDiv.appendChild(img); }
              }
            } else if (d.analysis_text) {
              fullDiv.textContent = d.analysis_text;
            }
            toggle.addEventListener('click', () => {
              const col = fullDiv.classList.toggle('hidden');
              toggle.textContent = col ? '▸ View full analysis' : '▾ Hide full analysis';
            });
            analysisOutput.appendChild(toggle);
            analysisOutput.appendChild(fullDiv);
          }
          return;
        }

        if (d.type === 'council_phase') {
          if (councilArea) councilArea.appendChild(mk('div', 'text-xs text-lavender/50 mt-3 mb-1 font-semibold uppercase tracking-wider', d.message));
          return;
        }

        if (d.type === 'council_thinking') {
          if (!councilArea) return;
          const color  = agentColor(d.agent);
          const bubble = mk('div', 'council-bubble fade-up');
          bubble.style.borderLeft = `3px solid ${color}`;
          bubble.innerHTML = `<div class="cb-header"><div class="cb-avatar" style="background:${color}">${agentInitial(d.agent)}</div><div class="cb-name" style="color:${color}">${d.agent}</div></div><div class="cb-content">${d.content}</div>`;
          councilArea.appendChild(bubble);
          bubble.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          enqueueAudio(d.audio_b64,
            () => bubble.classList.add('speaking'),
            () => bubble.classList.remove('speaking')
          );
          return;
        }

        if (d.type === 'council_vote') {
          if (!councilArea) return;
          const color = agentColor(d.agent);
          const vbox  = mk('div', 'vote-box fade-up');
          vbox.style.borderLeft = `3px solid ${color}`;
          vbox.innerHTML = `<div class="vote-badge ${d.vote}">${d.vote}</div><div><div class="vote-agent" style="color:${color}">${d.agent}</div><div class="vote-reasoning">${d.reasoning}</div></div>`;
          councilArea.appendChild(vbox);
          vbox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          enqueueAudio(d.audio_b64,
            () => vbox.classList.add('speaking'),
            () => vbox.classList.remove('speaking')
          );
          return;
        }

        if (d.type === 'council_verdict') {
          if (!councilArea) return;
          const v = mk('div', `verdict-card ${d.decision} fade-up`);
          v.innerHTML = `<div class="verdict-label">Council Verdict</div><div class="verdict-decision ${d.decision}">${(d.decision || '').toUpperCase()}</div><div class="verdict-tally">${d.approve} approve / ${d.reject} reject</div>`;
          councilArea.appendChild(v);
          v.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          enqueueAudio(d.audio_b64,
            () => v.classList.add('speaking'),
            () => v.classList.remove('speaking')
          );
          return;
        }

        if (d.type === 'council_done') {
          if (councilHeader) { councilHeader.className = 'phase-row done fade-up'; councilHeader.innerHTML = '<span class="check">✓</span><span>Council Complete</span>'; }
          return;
        }

        if (d.type === 'done') {
          if (d.analysis_id) {
            const badge = mk('div', 'saved-badge fade-up', '✔ Analysis saved to your history');
            analysisOutput.appendChild(badge);
            // Refresh the history panel so the new entry appears
            loadHistory();
          }
          return;
        }

        if (d.type === 'error') {
          const box = mk('div', 'mt-3 rounded-xl border border-danger/40 bg-danger/10 px-4 py-3 text-sm text-danger fade-up');
          box.textContent = d.detail || 'An error occurred.';
          analysisOutput.appendChild(box);
        }
      }

      // ── Analysis form submit ──────────────────────────────────────────────
      function animateScrollTo(target) {
        const start = window.scrollY, dist = target - start, dur = 650, t0 = performance.now();
        const ease  = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
        function step(now) {
          const p = Math.min((now - t0) / dur, 1);
          window.scrollTo(0, start + dist * ease(p));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      analyzeForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (isAnalyzing) return;
        const query = analysisInput.value.trim();
        if (!query) return;

        isAnalyzing = true;
        audioQueue  = [];
        audioPlaying = false;
        braveHeader = braveGrid = agentHeader = agentSteps = pendingStep = councilHeader = councilArea = null;

        analysisOutput.innerHTML = '';
        analysisOutput.classList.remove('hidden');

        requestAnimationFrame(() => {
          const top = chartSection.getBoundingClientRect().bottom + window.scrollY;
          animateScrollTo(Math.max(0, top));
        });

        try {
          const headers = { 'Content-Type': 'application/json' };
          if (currentSession?.access_token) headers['Authorization'] = 'Bearer ' + currentSession.access_token;

          const res = await fetch(API_BASE_URL + '/research/analyze', {
            method: 'POST',
            headers,
            body: JSON.stringify({ ticker: symbol, intent: query })
          });

          if (!res.ok) {
            handleEvent({ type: 'error', detail: `Server error ${res.status}` });
            return;
          }

          const reader  = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer    = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try { handleEvent(JSON.parse(line.slice(6))); } catch {}
            }
          }
        } catch (err) {
          handleEvent({ type: 'error', detail: err.message });
        } finally {
          isAnalyzing = false;
        }
      });

      analysisInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); analyzeForm.requestSubmit(); }
      });

      // ── Analysis history ──────────────────────────────────────────────────
      const historySection = document.getElementById('history-section');
      const historyList    = document.getElementById('history-list');
      const historyCount   = document.getElementById('history-count');

      function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
               ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      }

      function renderHistory(analyses) {
        historyList.innerHTML = '';
        if (!analyses.length) {
          historyList.innerHTML = '<p class="text-xs text-zinc-500">No analyses yet for this stock.</p>';
          return;
        }
        historyCount.textContent = `${analyses.length} saved`;
        for (const a of analyses) {
          const verdict  = (a.council_verdict || '').toLowerCase();
          const vClass   = verdict === 'approved' ? 'approved' : verdict === 'rejected' ? 'rejected' : 'none';
          const vLabel   = verdict || 'no vote';
          const card     = document.createElement('div');
          card.className = 'history-card fade-up';
          card.innerHTML = `
            <div class="history-meta">
              <span class="history-date">${formatDate(a.created_at)}</span>
              <span class="history-verdict ${vClass}">${vLabel}</span>
              <span class="history-expand-icon">▸</span>
            </div>
            <div class="history-prompt">${a.prompt || a.intent || ''}</div>
            <div class="history-advice">${a.advice || a.analysis_text || ''}</div>
          `;
          card.addEventListener('click', () => {
            const expanded = card.classList.toggle('expanded');
            card.querySelector('.history-expand-icon').textContent = expanded ? '▾' : '▸';
          });
          historyList.appendChild(card);
        }
      }

      async function loadHistory() {
        try {
          const res  = await apiFetch('/analyses');
          if (!res.ok) return;
          const data = await res.json();
          const all  = Array.isArray(data) ? data : (data.analyses || []);
          // Filter to analyses for this specific stock
          const mine = all.filter(a => (a.ticker_name || '').toUpperCase() === symbol);
          if (mine.length) {
            historySection.classList.remove('hidden');
            renderHistory(mine);
          }
        } catch (e) { console.error('History load failed', e); }
      }
    </script>
  </body>
</html>
